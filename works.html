<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>WORKS</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Euphemia UCAS', sans-serif;
            background-color: #ffffff;
            color: #654321;
            overflow-x: hidden;
        }

        .cv-main-container {
            max-width: 1500px; 
            margin: 0 auto;
            padding: 100px 20px 100px 20px;
            display: flex;
            gap: 40px; 
            position: relative;
        }

        /* [1구역] 맨 왼쪽: 대분류 탭 메뉴 */
        .photo-zone {
            width: 155px; 
            flex-shrink: 0;
            margin-top: 43px;
            position: relative;
            z-index: 20;
        }

        .works-main-tab {
            font-size: 18px; 
            font-weight: 1100;
            color: #654321;
            text-decoration: none; 
            border: 1px solid #654321; 
            padding: 6px 12px; 
            margin-bottom: 25px; 
            display: inline-block; 
            cursor: pointer;
            transition: color 0.2s ease;
            user-select: none;
            box-sizing: border-box;
            width: 100%; 
            text-align: center;
            background-color: #ffffff;
        }
        .works-main-tab:hover { color: #0022ff; }
        .works-main-tab.active-tab { color: #0022ff; }


        /* [2구역] 가운데: 작업 타이틀 리스트 구역 (슬라이딩 시 연동 애니메이션 탑재) */
        .info-zone {
            width: 250px; 
            flex-shrink: 0;
            padding-top: 43px; 
            position: relative;
            z-index: 15;
            background-color: transparent;
            margin-right: -10px; 
            /* 트랜지션 추가: 슬라이딩 시 통째로 부드럽게 반응 */
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.5s ease;
            transform-origin: left bottom;
        }

        .content-section { display: none; }
        .content-section.active { display: block; }

        .works-year-title {
            font-size: 19px;
            font-weight: bold;
            color: #654321;
            margin-top: 40px;
            margin-bottom: 15px;
            letter-spacing: -1px;
            line-height: 1.8; 
        }
        
        .content-section > .works-year-title:first-child {
            margin-top: 0;
            padding-top: 2px; 
        }

        .works-text-link, .works-text-disabled {
            display: block;
            font-size: 16px;
            font-weight: 400; 
            color: #654321;
            letter-spacing: -1px; 
            text-decoration: none; 
            padding: 7px 0; 
            user-select: none;
        }

        .works-text-link {
            cursor: pointer;
            transition: color 0.2s ease;
        }
        .works-text-link:hover { color: #0022ff; }
        .works-text-link.viewing { color: #0022ff; font-weight: 400 !important; }
        .works-text-disabled { cursor: default; }
        .scroll-tester-space { height: 30vh; }


        /* [3구역] 사진 슬라이드 영역 - 왼쪽 끝까지 넓게 공간을 활용하도록 변경 */
        .artwork-display-zone {
            flex-grow: 1;
            max-width: 1050px;
            margin-top: 110px; 
            position: relative;
            border: none; 
            background: none; 
            /* info-zone 구역 뒤쪽으로 파고들 수 있도록 마진 조정 및 z-index 부여 */
            margin-left: -180px;
            z-index: 5;
        }

        /* 마우스 드래그 윈도우 */
        .photo-slider-window {
            width: 100%;
            overflow-x: auto; 
            overflow-y: hidden;
            position: relative;
            scrollbar-width: none; 
            cursor: grab; 
        }
        .photo-slider-window:active {
            cursor: grabbing; 
        }
        .photo-slider-window::-webkit-scrollbar {
            display: none; 
        }

        /* 사진 기차 컨테이너 */
        .slide-train {
            display: flex;
            gap: -3px; 
            width: max-content; 
        }

        /* 개별 슬라이드 칸 - 유연한 너비 확장 */
        .slide-item {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center; /* 가로 기준점 가운데 맞춤 */
            width: 1020px; 
        }

        /* 원본 사진 래퍼 - 정중앙 배치를 위해 flex 및 center 부여 */
        .viewer-frame {
            width: 100%;
            height: 650px; 
            display: flex;
            justify-content: center; /* 가로 가운데 정렬 */
            align-items: center;     /* 세로 가운데 정렬 */
            background-color: transparent;
        }

        /* 💡 중구난방 방지: 이미지 기준점 가운데 정렬 설정 */
        .artwork-viewer {
            max-width: 100%;
            max-height: 100%; 
            object-fit: contain; /* 비율 유지하며 프레임 내에 가득 맞춤 */
            display: block; 
            user-select: none;
            -webkit-user-drag: none; 
        }

        /* 사진 하단 캡션 정보란 */
        .artwork-meta-info-fixed {
            margin-top: 15px; 
            font-size: 14px;
            line-height: 1.6;
            color: #654321;
            font-weight: 400;
            letter-spacing: -0.5px;
            width: 100%;
            text-align: center; /* 캡션 글자도 보기 좋게 가운데 정렬 */
        }

        /* 하단 슬라이드 바 */
        .custom-scrollbar-container {
            width: 100%;
            height: 3px;
            background-color: #eaeaea;
            margin-top: 25px;
            position: relative;
            display: none; 
        }
        .custom-scrollbar-thumb {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0px; 
            background-color: #654321;
            transition: transform 0.1s linear;
        }


        /* ---------------------------------------------------- */
        /* 우측 상단 고정 WORKS 로고 블록 (-55px 조율 정보 유지) */
        /* ---------------------------------------------------- */
        .header-menu-block {
            position: fixed; 
            top: 40px;
            right: 40px;
            display: flex;
            flex-direction: column; 
            align-items: flex-end;    
            z-index: 1000;
        }

        .cv-logo-link {
            text-decoration: none;
            display: inline-block;
            font-weight: 1100;
            line-height: 1;
            margin-bottom: 20px;
            margin-right: -68px; 
            transition: all 0.4s ease-in-out;
            position: relative;
            z-index: 1010; 
            height: 170px; 
        }

        .char-w, .char-o, .char-r, .char-k, .char-s {
            font-size: 115px; 
            color: transparent;
            -webkit-text-stroke: 1.7px #654321;
            transition: all 0.4s ease-in-out;
            font-weight: 1100;
            position: relative;
            display: inline-block;
        }
        .char-w { top: 0px; left: 0px; letter-spacing: -6px; }
        .char-o { top: 45px; left: -15px; }
        .char-r { top: -10px; left: -22px; }
        .char-k { top: 35px; left: -35px; }
        .char-s { top: 10px; left: -45px; }

        .sub-menu-container {
            display: flex;
            flex-direction: column; 
            gap: 35px; 
            align-items: flex-end; 
            opacity: 0;
            transform: translateX(50px); 
            transition: all 0.5s ease-in-out;
            pointer-events: none; 
            margin-top: 15px; 
        }

        .sub-menu-link {
            font-size: 23px; 
            text-decoration: none;
            font-weight: 900;
            color: transparent;
            -webkit-text-stroke: 1px #654321; 
            letter-spacing: -1px;
            line-height: 1.2;
        }

        .header-menu-block.scrolled .cv-logo-link {
            height: 95px;
            margin-bottom: 45px; 
            margin-right: -23px;   
        }

        .header-menu-block.scrolled .char-w, .header-menu-block.scrolled .char-o, .header-menu-block.scrolled .char-r, .header-menu-block.scrolled .char-k, .header-menu-block.scrolled .char-s {
            font-size: 60px;
            -webkit-text-stroke: 1.2px #654321; 
        }
        .header-menu-block.scrolled .char-w { top: 0px; left: 0px; }
        .header-menu-block.scrolled .char-o { top: 23px; left: -8px; }
        .header-menu-block.scrolled .char-r { top: -5px; left: -11px; }
        .header-menu-block.scrolled .char-k { top: 18px; left: -18px; }
        .header-menu-block.scrolled .char-s { top: 5px; left: -23px; }

        .header-menu-block.scrolled .sub-menu-container {
            opacity: 1;
            transform: translateX(0); 
            pointer-events: auto; 
            margin-top: 0; 
        }
    </style>
</head>
<body>

    <div class="cv-main-container">
        
        <div class="photo-zone">
            <span class="works-main-tab" id="tab-worklist" onclick="switchTab('worklist')">WORK LIST</span><br>
            <span class="works-main-tab" id="tab-exhibitions" onclick="switchTab('exhibitions')">EXHIBITIONS</span>
        </div>

        <div class="info-zone" id="infoZone">
            <div id="section-worklist" class="content-section">
                <div class="works-year-title">2026</div>
                <span class="works-text-link" onclick="loadArtworkGroup('the-last-island', this)">The Last Island</span>
                <span class="works-text-link" onclick="loadArtworkGroup('bad-mom', this)">Bad Mom</span>
                <span class="works-text-link" onclick="works-text-link" onclick="loadArtworkGroup('ennui', this)">Ennui</span>
                
                <div class="works-year-title">2025</div>
                <span class="works-text-link" onclick="loadArtworkGroup('victory-of-lays', this)">Victory of Lays</span>
                <span class="works-text-link" onclick="loadArtworkGroup('hope', this)">Hope</span>
                <span class="works-text-link" onclick="loadArtworkGroup('horse-racing', this)">Horse racing</span>
                <span class="works-text-link" onclick="loadArtworkGroup('baum', this)">Baum</span>
                
                <span class="works-text-link" onclick="loadArtworkGroup('abdruck', this)">Abdruck</span>
                <span class="works-text-link" onclick="loadArtworkGroup('bienenstich', this)">Bienenstich</span>
                <span class="works-text-link" onclick="loadArtworkGroup('wild-fire', this)">Wild fire</span>
            </div>

            <div id="section-exhibitions" class="content-section">
                <div class="works-year-title">2026</div>
                <div class="works-text-disabled">Do you clean your mirror, everyday? Solo</div>
                <div class="works-text-disabled">여기에 전시 이름을 적으세요 (Solo/Group)</div>
            </div>
            <div class="scroll-tester-space"></div>
        </div> 

        <div class="artwork-display-zone">
            <div class="photo-slider-window" id="sliderWindow">
                <div class="slide-train" id="slideTrain"></div>
            </div>

            <div class="custom-scrollbar-container" id="customScrollbar">
                <div class="custom-scrollbar-thumb" id="scrollThumb"></div>
            </div>
        </div>

        <div class="header-menu-block" id="menuBlock">
            <a href="../index.html" class="cv-logo-link">
                <span class="char-w">W</span><span class="char-o">O</span><span class="char-r">R</span><span class="char-k">K</span><span class="char-s">S</span>
            </a>
            <div class="sub-menu-container">
                <a href="../index.html" class="sub-menu-link">HOME</a>
                <a href="../cv.html" class="sub-menu-link">CV</a>
                <a href="../press.html" class="sub-menu-link">PRESS</a>
                <a href="../teller-tiger.html" class="sub-menu-link">TELLER TIGER</a>
            </div>
        </div>

    </div>

    <script>
        // 💡 모든 작업 데이터베이스 분리 매핑 (원하는 만큼 내부 배열에 디테일 샷 추가 가능)
        const dbRepository = {
            "the-last-island": [
                { src: "../images/the-last-island.jpg", alt: "The Last Island", meta: "220 x 170 cm, Oil on canvas, 2026" }
            ],
            "bad-mom": [
                { src: "../images/bad-mom.jpg", alt: "Bad Mom", meta: "250 × 170 cm (diptych, two canvases, each 125 × 170 cm), Oil on canvas, 2026" }
            ],
            "ennui": [
                { src: "../images/ennui.jpg", alt: "Ennui", meta: "100 x 150 cm, Oil on canvas, 2026" }
            ],
            "victory-of-lays": [
                { src: "../images/victory-of-lays.jpg", alt: "Victory of Lays", meta: "220 x 60 cm, Oil on canvas, 2025" }
            ],
            "hope": [
                { src: "../images/hope/hope-main.jpg", alt: "Hope", meta: "214 x 60 x 46 cm, Drawing on Installation, Polyester, 2025" },
                { src: "../images/hope/hope-1.jpg", alt: "Hope Detail 1", meta: "Hope Detail, Drawing on Installation, 2025" },
                { src: "../images/hope/hope-2.jpg", alt: "Hope Detail 2", meta: "Hope Detail, Drawing on Installation, 2025" },
                { src: "../images/hope/hope-3.jpg", alt: "Hope Detail 3", meta: "Hope Detail, Drawing on Installation, 2025" },
                { src: "../images/hope/hope-4.jpg", alt: "Hope Detail 4", meta: "Hope Detail, Drawing on Installation, 2025" }
            ],
            "horse-racing": [
                { src: "../images/horse-racing.jpg", alt: "Horse racing", meta: "180 x 135 cm, Oil on canvas, Air spray, coloured pencil, 2025" }
            ],
            "baum": [
                { src: "../images/baum.jpg", alt: "Baum", meta: "186 x 115 cm, Oil on canvas, 2025" }
            ],
            "abdruck": [
                { src: "../images/abdruck/abdruck-main.jpg", alt: "Abdruck", meta: "Installation with drawing on fabric, 126 x 172 x 70 cm, 2025" },
                { src: "../images/abdruck/abdruck-1.jpg", alt: "Abdruck Detail 1", meta: "Abdruck detail, Installation with drawing on fabric, 2025" },
                { src: "../images/abdruck/abdruck-2.jpg", alt: "Abdruck Detail 2", meta: "Abdruck detail, Installation with drawing on fabric, 2025" },
                { src: "../images/abdruck/abdruck-3.jpg", alt: "Abdruck Detail 3", meta: "Abdruck detail, Installation with drawing on fabric, 2025" },
                { src: "../images/abdruck/abdruck-4.jpg", alt: "Abdruck Detail 4", meta: "Abdruck detail, Installation with drawing on fabric, 2025" },
                { src: "../images/abdruck/abdruck-5.jpg", alt: "Abdruck Detail 5", meta: "Abdruck detail, Installation with drawing on fabric, 2025" },
                { src: "../images/abdruck/abdruck-6.jpg", alt: "Abdruck Detail 6", meta: "Abdruck detail, Installation with drawing on fabric, 2025" }
            ],
            "bienenstich": [
                { src: "../images/bienenstich.jpg", alt: "Bienenstich", meta: "130 x 95 cm, Oil on canvas, 2025" }
            ],
            "wild-fire": [
                { src: "../images/wild-fire.jpg", alt: "Wild fire", meta: "38 x 64 cm, Lithography, 2025" }
            ]
        };

        const sliderWindow = document.getElementById('sliderWindow');
        const slideTrain = document.getElementById('slideTrain');
        const customScrollbar = document.getElementById('customScrollbar');
        const scrollThumb = document.getElementById('scrollThumb');
        const infoZone = document.getElementById('infoZone');

        let currentGroupLength = 0;
        const itemWidth = 1021; // 가로 크기 1020px + gap 1px

        // 💡 특정 작업을 클릭했을 때 내부 구조를 완전히 새로 그리는 코어 핵심 함수
        function loadArtworkGroup(groupKey, element) {
            // 메뉴 활성화 하이라이트 제어
            document.querySelectorAll('.works-text-link').forEach(link => link.classList.remove('viewing'));
            if(element) element.classList.add('viewing');

            // 초기화
            slideTrain.innerHTML = '';
            sliderWindow.scrollLeft = 0;
            
            // 메뉴 복원 초기화
            infoZone.style.transform = 'translate(0, 0) scale(1)';
            infoZone.style.opacity = '1';

            const items = dbRepository[groupKey] || [];
            currentGroupLength = items.length;

            // 엘리먼트 동적 렌더링 생성
            items.forEach(data => {
                const slideItem = document.createElement('div');
                slideItem.className = 'slide-item';
                slideItem.innerHTML = `
                    <div class="viewer-frame">
                        <img class="artwork-viewer" src="${data.src}" alt="${data.alt}">
                    </div>
                    <div class="artwork-meta-info-fixed">${data.meta}</div>
                `;
                slideTrain.appendChild(slideItem);
            });

            // 단독 사진 리스트일 경우 하단 슬라이드바 자동 숨김, 디테일이 여러 장이면 노출
            if (currentGroupLength > 1) {
                customScrollbar.style.display = 'block';
                updateScrollbarThumb();
            } else {
                customScrollbar.style.display = 'none';
            }
        }

        // 💡 실시간 슬라이딩 위치 측정 및 왼쪽 메뉴판 연동 트랜스폼 애니메이션 함수
        function handleScrollInteractions() {
            if (currentGroupLength <= 1) return;

            const currentScroll = sliderWindow.scrollLeft;
            const maxScrollLeft = (currentGroupLength - 1) * itemWidth;

            // 1. 하단 미니 슬라이드 바 동기화 계산
            const visibleWidth = sliderWindow.clientWidth;
            const totalTrainWidth = currentGroupLength * itemWidth - 1;
            const thumbWidthRatio = visibleWidth / totalTrainWidth;
            const thumbWidth = Math.max(visibleWidth * thumbWidthRatio, 40);
            
            const progress = maxScrollLeft > 0 ? currentScroll / maxScrollLeft : 0;
            const maxThumbLeft = visibleWidth - thumbWidth;
            const thumbLeft = progress * maxThumbLeft;

            scrollThumb.style.width = `${thumbWidth}px`;
            scrollThumb.style.transform = `translateX(${thumbLeft}px)`;

            // 2. 💡 [핵심] 왼쪽 마우스 슬라이딩 시 work list 대기 메뉴 축소 및 EXHIBITIONS 하단 이동 연동
            if (currentScroll > 5) {
                // 부드럽게 작아지면서 왼쪽 아래 대각선 방향으로 이동 처리
                const factor = Math.min(currentScroll / 400, 1); // 400px 스크롤 시 최대 수치 도달
                const scaleVal = 1 - (factor * 0.25);  // 원본 크기의 75%까지 축소
                const moveX = factor * -45;            // 왼쪽으로 45px 이동
                const moveY = factor * 160;            // 전시 버튼 밑 영역 방향(아래)으로 160px 드롭 이동
                
                infoZone.style.transform = `translate(${moveX}px, ${moveY}px) scale(${scaleVal})`;
                infoZone.style.opacity = `${1 - (factor * 0.35)}`; // 가독성을 위해 살짝 반투명화 효과 가미
            } else {
                // 완전히 첫 사진으로 원위치 복귀 시 원래 배율로 원상복구
                infoZone.style.transform = 'translate(0, 0) scale(1)';
                infoZone.style.opacity = '1';
            }
        }

        sliderWindow.addEventListener('scroll', handleScrollInteractions);

        /* 💡 마우스 드래그 스와이프 로직 */
        let isDown = false;
        let startX;
        let scrollLeftOffset;

        sliderWindow.addEventListener('mousedown', (e) => {
            isDown = true;
            startX = e.pageX - sliderWindow.offsetLeft;
            scrollLeftOffset = sliderWindow.scrollLeft;
        });
        sliderWindow.addEventListener('mouseleave', () => { isDown = false; });
        sliderWindow.addEventListener('mouseup', () => { isDown = false; });
        sliderWindow.addEventListener('mousemove', (e) => {
            if(!isDown) return;
            e.preventDefault();
            const x = e.pageX - sliderWindow.offsetLeft;
            const walk = (x - startX) * 1.6; // 반응 속도 및 감도 최적화
            sliderWindow.scrollLeft = scrollLeftOffset - walk;
        });

        // 탭 메뉴 대분류 변환
        function switchTab(tabId) {
            document.querySelectorAll('.content-section').forEach(section => section.classList.remove('active'));
            document.querySelectorAll('.works-main-tab').forEach(tab => tab.classList.remove('active-tab'));

            document.getElementById('section-' + tabId).classList.add('active');
            document.getElementById('tab-' + tabId).classList.add('active-tab');
            
            if(tabId !== 'worklist') {
                slideTrain.innerHTML = '';
                customScrollbar.style.display = 'none';
                infoZone.style.transform = 'translate(0, 0) scale(1)';
                infoZone.style.opacity = '1';
            } else {
                const firstItem = document.querySelector('#section-worklist .works-text-link');
                if(firstItem) firstItem.click();
            }
        }

        // 우측 고정 메뉴 스크롤 변형 효과 
        window.addEventListener('scroll', function() {
            const menuBlock = document.getElementById('menuBlock');
            if (window.scrollY > 20) {
                menuBlock.classList.add('scrolled');
            } else {
                menuBlock.classList.remove('scrolled');
            }
        });

        // 다 로딩되면 초기 구동 실행
        switchTab('worklist');
    </script>

</body>
</html>
