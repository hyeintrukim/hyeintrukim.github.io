<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>WORKS</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Euphemia UCAS', sans-serif;
            background-color: #ffffff;
            color: #654321;
            overflow-x: hidden;
        }

        .cv-main-container {
            width: 100%;
            box-sizing: border-box;
            padding: 100px 40px;
            display: flex;
            gap: 40px; 
            position: relative;
        }

        /* [1구역] 맨 왼쪽: 대분류 탭 메뉴 */
        .photo-zone {
            width: 155px; 
            flex-shrink: 0;
            margin-top: 43px;
            position: relative;
            z-index: 100;
            background-color: #ffffff;
        }

        .works-main-tab {
            font-size: 18px; 
            font-weight: 1100;
            color: #654321;
            text-decoration: none; 
            border: 1px solid #654321; 
            padding: 6px 12px; 
            margin-bottom: 25px; 
            display: inline-block; 
            cursor: pointer;
            transition: color 0.2s ease;
            user-select: none;
            box-sizing: border-box;
            width: 100%; 
            text-align: center;
            background-color: #ffffff;
        }
        .works-main-tab:hover { color: #0022ff; }
        .works-main-tab.active-tab { color: #0022ff; }


        /* [2구역] 가운데: 세부 작업 타이틀 리스트 */
        .info-zone {
            width: 250px; 
            flex-shrink: 0;
            padding-top: 43px; 
            position: relative;
            z-index: 90;
            background-color: transparent;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.4s ease;
            transform-origin: left top;
        }

        .content-section { display: none; }
        .content-section.active { display: block; }

        .works-year-title {
            font-size: 19px;
            font-weight: bold;
            color: #654321;
            margin-top: 40px;
            margin-bottom: 15px;
            letter-spacing: -1px;
            line-height: 1.8; 
        }
        
        .content-section > .works-year-title:first-child {
            margin-top: 0;
            padding-top: 2px; 
        }

        .works-text-link, .works-text-disabled {
            display: block;
            font-size: 16px;
            font-weight: 400; 
            color: #654321;
            letter-spacing: -1px; 
            text-decoration: none; 
            padding: 7px 0; 
            user-select: none;
            background-color: #ffffff;
        }

        .works-text-link {
            cursor: pointer;
            transition: color 0.2s ease;
        }
        .works-text-link:hover { color: #0022ff; }
        .works-text-link.viewing { color: #0022ff; font-weight: 400 !important; }
        .works-text-disabled { cursor: default; }


        /* [3구역] 사진 슬라이드 영역 */
        .artwork-display-zone {
            flex-grow: 1;
            margin-top: 43px; 
            position: relative;
            z-index: 5;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* 영역 삐져나감 방지 */
        }

        /* 💡 여러 사진 모드: 슬라이딩 성능 향상 및 오버플로우 허용 */
        .artwork-display-zone.multi-mode {
            margin-left: -200px; /* 왼쪽 메뉴 위로 부드럽게 덮으며 지나가도록 마진 조정 */
        }

        /* 💡 단독 사진 모드: 왼쪽 메뉴 바로 옆 밀착 */
        .artwork-display-zone.single-mode {
            margin-left: 0px;
        }

        /* 마우스 드래그 & 스크롤 윈도우 */
        .photo-slider-window {
            width: 100%;
            overflow-x: auto; 
            overflow-y: hidden;
            position: relative;
            scrollbar-width: none; /* 파이어폭스 스크롤바 숨김 */
            cursor: grab; 
            display: flex;
        }
        .photo-slider-window:active { cursor: grabbing; }
        .photo-slider-window::-webkit-scrollbar { display: none; } /* 크롬 스크롤바 숨김 */

        /* 💡 정렬 설정 변경: 다중 이미지일 때는 스크롤 시작점을 위해 flex-start 고정 */
        .artwork-display-zone.multi-mode .photo-slider-window {
            justify-content: flex-start;
            padding-left: 15%; /* 가운데 정렬 느낌을 주기 위한 왼쪽 내부 여백 */
        }
        .artwork-display-zone.single-mode .photo-slider-window {
            justify-content: flex-start;
            padding-left: 0;
        }

        /* 사진 트레인 컨테이너 */
        .slide-train {
            display: flex;
            gap: 20px; /* 사진 간 간격 확보 */
            width: max-content; 
        }

        /* 개별 사진 슬라이드 칸 */
        .slide-item {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* 원본 사진 래퍼 */
        .viewer-frame {
            height: 650px; 
            display: flex;
            align-items: center;    
            justify-content: center;
            position: relative;
        }

        .artwork-viewer {
            max-width: 100%;
            max-height: 100%; 
            object-fit: contain; 
            display: block; 
            user-select: none;
            -webkit-user-drag: none; 
        }

        /* 첫 번째 사진 우측 하단 캡션 정보란 */
        .artwork-meta-info-fixed {
            position: absolute;
            font-size: 14px;
            line-height: 1.6;
            color: #654321;
            font-weight: 400;
            letter-spacing: -0.8px;
            white-space: nowrap;
            pointer-events: none;
            margin-top: 10px;
            opacity: 0;
            transition: opacity 0.2s ease;
            z-index: 95;
        }

        /* 하단 슬라이드 바 */
        .custom-scrollbar-container {
            width: 600px;
            height: 3px;
            background-color: #eaeaea;
            margin: 40px auto 0 auto;
            position: relative;
            display: none; 
        }
        .custom-scrollbar-thumb {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0px; 
            background-color: #654321;
        }

        /* 우측 상단 고정 WORKS 로고 블록 */
        .header-menu-block {
            position: fixed; 
            top: 40px;
            right: 40px;
            display: flex;
            flex-direction: column; 
            align-items: flex-end;    
            z-index: 1000;
        }

        .cv-logo-link {
            text-decoration: none;
            display: inline-block;
            font-weight: 1100;
            line-height: 1;
            margin-bottom: 20px;
            margin-right: -68px; 
            transition: all 0.4s ease-in-out;
            position: relative;
            z-index: 1010; 
            height: 170px; 
        }

        .char-w, .char-o, .char-r, .char-k, .char-s {
            font-size: 115px; 
            color: transparent;
            -webkit-text-stroke: 1.7px #654321;
            transition: all 0.4s ease-in-out;
            font-weight: 1100;
            position: relative;
            display: inline-block;
        }
        .char-w { top: 0px; left: 0px; letter-spacing: -6px; }
        .char-o { top: 45px; left: -15px; }
        .char-r { top: -10px; left: -22px; }
        .char-k { top: 35px; left: -35px; }
        .char-s { top: 10px; left: -45px; }

        .sub-menu-container {
            display: flex;
            flex-direction: column; 
            gap: 35px; 
            align-items: flex-end; 
            opacity: 0;
            transform: translateX(50px); 
            transition: all 0.5s ease-in-out;
            pointer-events: none; 
            margin-top: 15px; 
        }

        .sub-menu-link {
            font-size: 23px; 
            text-decoration: none;
            font-weight: 900;
            color: transparent;
            -webkit-text-stroke: 1px #654321; 
            letter-spacing: -1px;
            line-height: 1.2;
        }

        .header-menu-block.scrolled .cv-logo-link {
            height: 95px;
            margin-bottom: 45px; 
            margin-right: -23px;    
        }

        .header-menu-block.scrolled .char-w, .header-menu-block.scrolled .char-o, .header-menu-block.scrolled .char-r, .header-menu-block.scrolled .char-k, .header-menu-block.scrolled .char-s {
            font-size: 60px;
            -webkit-text-stroke: 1.2px #654321; 
        }
        .header-menu-block.scrolled .char-w { top: 0px; left: 0px; }
        .header-menu-block.scrolled .char-o { top: 23px; left: -8px; }
        .header-menu-block.scrolled .char-r { top: -5px; left: -11px; }
        .header-menu-block.scrolled .char-k { top: 18px; left: -18px; }
        .header-menu-block.scrolled .char-s { top: 5px; left: -23px; }
