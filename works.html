<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>WORKS</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Euphemia UCAS', sans-serif;
            background-color: #ffffff;
            color: #654321; /* 전체 기본 텍스트 톤 갈색 통일 */
        }

        .cv-main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 100px 40px;
            display: flex;
            gap: 40px; /* CV/PRESS 패밀리룩 갭 규격 */
            position: relative;
        }

        /* [왼쪽 구역] 클릭 가능한 대분류 메뉴 공간 */
        .photo-zone {
            width: 250px;
            flex-shrink: 0;
            margin-top: 43px;
            margin-left: -5px; /* 좌측으로 5px 밀착 */
        }

        /* 메뉴 네모 상자 스타일 */
        .works-main-tab {
            font-size: 18px; 
            font-weight: 1100;
            color: #654321;
            text-decoration: none; 
            border: 1px solid #654321; 
            padding: 6px 12px; 
            margin-bottom: 30px; 
            display: inline-block; 
            cursor: pointer;
            transition: color 0.2s ease;
            user-select: none;
        }

        /* 마우스 올릴 때 영어 단어 글자만 파란색으로 변경 */
        .works-main-tab:hover {
            color: #0022ff;
        }

        /* 클릭 시 활성화된 탭 영어 단어 글자 파란색 유지 */
        .works-main-tab.active-tab {
            color: #0022ff;
        }

        /* [오른쪽 구역] 펼쳐지는 콘텐츠(리스트) 공간 */
        .info-zone {
            flex-grow: 1;
            padding-top: 56px; /* 좌측 메뉴 첫 선보다 년도가 3px 밑에 오도록 세팅 */
            margin-left: -5px; /* 메인 텍스트들 좌측으로 5px 이동 */
            max-width: 500px; /* 본문 텍스트 최대 크기 제한 */
        }

        /* 기본적으로 모든 콘텐츠 리스트 섹션은 숨겨둠 */
        .content-section {
            display: none;
        }

        /* 활성화된 리스트 섹션만 노출 */
        .content-section.active {
            display: block;
        }

        /* 년도 폰트 크기 세팅 */
        .works-year-title {
            font-size: 19px;
            font-weight: bold;
            color: #654321;
            margin-top: 40px;
            margin-bottom: 15px;
        }
        .content-section > .works-year-title:first-of-type {
            margin-top: 0; /* 첫 번째 년도는 기준선 정렬을 위해 상단 여백 제거 */
        }

        /* ---------------------------------------------------- */
        /* 순수 텍스트 스타일 링크 (WORK LIST & EXHIBITIONS 공통 적용) */
        /* ---------------------------------------------------- */
        .works-text-link, .works-text-disabled {
            display: block;
            font-size: 16px;
            font-weight: 400; /* 일반 폰트 두께 */
            color: #654321;
            letter-spacing : 2px;
            text-decoration: none; /* 밑줄 없는 깨끗한 상태 */
            padding: 7px 0; /* 줄간격 유지를 위한 상하 패딩 */
        }

        /* 💡 마우스 올렸을 때 텍스트가 파란색으로 변경 */
        .works-text-link {
            cursor: pointer;
            transition: color 0.2s ease;
        }
        .works-text-link:hover {
            color: #0022ff;
        }

        /* 아직 링크가 연결되지 않은 텍스트 스타일 */
        .works-text-disabled {
            cursor: default;
        }

        /* 스크롤 테스트용 강제 하단 여백 공간 생성 */
        .scroll-tester-space {
            height: 100vh;
        }

        /* ---------------------------------------------------- */
        /* 우측 상단 고정 스마트 메뉴 블록 (CV/PRESS 패밀리룩 유지) */
        /* ---------------------------------------------------- */
        .header-menu-block {
            position: fixed; 
            top: 40px;
            right: 40px;
            display: flex;
            flex-direction: column; 
            align-items: flex-end;  
            z-index: 1000;
        }

        .cv-logo-link {
            text-decoration: none;
            display: inline-block;
            font-weight: 1100;
            line-height: 1;
            margin-bottom: 20px;
            margin-right: -45px; 
            transition: all 0.4s ease-in-out;
            position: relative;
            z-index: 1010; 
            height: 170px; 
        }

        /* W, O, R, K, S 개별 글자 배치 디자인 */
        .char-w, .char-o, .char-r, .char-k, .char-s {
            font-size: 115px; 
            color: transparent;
            -webkit-text-stroke: 1.7px #654321;
            transition: all 0.4s ease-in-out;
            font-weight: 1100;
            position: relative;
            display: inline-block;
        }
        .char-w { top: 0px; left: 0px; letter-spacing: -6px; }
        .char-o { top: 45px; left: -15px; }
        .char-r { top: -10px; left: -22px; }
        .char-k { top: 35px; left: -35px; }
        .char-s { top: 10px; left: -45px; }

        /* 세로 서브 메뉴 저장소 */
        .sub-menu-container {
            display: flex;
            flex-direction: column; 
            gap: 35px; 
            align-items: flex-end; 
            opacity: 0;
            transform: translateX(50px); 
            transition: all 0.5s ease-in-out;
            pointer-events: none; 
            margin-top: 15px; 
        }

        .sub-menu-link {
            font-size: 23px; 
            text-decoration: none;
            font-weight: 900;
            color: transparent;
            -webkit-text-stroke: 1px #654321; 
            letter-spacing: -1px;
            line-height: 1.2;
        }

        /* 스크롤 시 축소 반응형 디자인 */
        .header-menu-block.scrolled .cv-logo-link {
            height: 95px;
            margin-bottom: 45px; 
            margin-right: -23px;  
        }

        .header-menu-block.scrolled .char-w,
        .header-menu-block.scrolled .char-o,
        .header-menu-block.scrolled .char-r,
        .header-menu-block.scrolled .char-k,
        .header-menu-block.scrolled .char-s {
            font-size: 60px;
            -webkit-text-stroke: 1.2px #654321; 
        }
        .header-menu-block.scrolled .char-w { top: 0px; left: 0px; }
        .header-menu-block.scrolled .char-o { top: 23px; left: -8px; }
        .header-menu-block.scrolled .char-r { top: -5px; left: -11px; }
        .header-menu-block.scrolled .char-k { top: 18px; left: -18px; }
        .header-menu-block.scrolled .char-s { top: 5px; left: -23px; }

        .header-menu-block.scrolled .sub-menu-container {
            opacity: 1;
            transform: translateX(0); 
            pointer-events: auto; 
            margin-top: 0; 
        }
    </style>
</head>
<body>

    <div class="cv-main-container">
        
        <div class="photo-zone">
            <span class="works-main-tab" id="tab-worklist" onclick="switchTab('worklist')">WORK LIST</span><br>
            <span class="works-main-tab" id="tab-exhibitions" onclick="switchTab('exhibitions')">EXHIBITIONS</span>
        </div>

        <div class="info-zone">
            
            <div id="section-worklist" class="content-section">
                <div class="works-year-title">2026</div>
                
                <div class="works-text-disabled">The last Island</div>
                <div class="works-text-disabled">Bad Mom</div>
                <div class="works-text-disabled">권태</div>
                
                <div class="works-year-title">2025</div>
                
                <div class="works-text-disabled">Victory of Lays</div>
                <div class="works-text-disabled">Hope</div>
                <div class="works-text-disabled">Horse racing</div>
                <div class="works-text-disabled">Tree</div>
                <div class="works-text-disabled">Abdruck</div>
                <a href="work-bienenstich.html" class="works-text-link">Bienenstich</a>
                <div class="works-text-disabled">Wild fire</div>
            </div>

            <div id="section-exhibitions" class="content-section">
                <div class="works-year-title">2026</div>
                
                <div class="works-text-disabled">Do you clean your mirror, everyday? Solo</div>
                <div class="works-text-disabled">여기에 전시 이름을 적으세요 (Solo/Group)</div>
            </div>
            
            <div class="scroll-tester-space"></div>
            
        </div> <div class="header-menu-block" id="menuBlock">
            <a href="index.html" class="cv-logo-link">
                <span class="char-w">W</span><span class="char-o">O</span><span class="char-r">R</span><span class="char-k">K</span><span class="char-s">S</span>
            </a>
            <div class="sub-menu-container">
                <a href="index.html" class="sub-menu-link">HOME</a>
                <a href="cv.html" class="sub-menu-link">CV</a>
                <a href="press.html" class="sub-menu-link">PRESS</a>
                <a href="teller-tiger.html" class="sub-menu-link">TELLER TIGER</a>
            </div>
        </div>

    </div>

    <script>
        // 1. 왼쪽 탭 메뉴 전환 인터랙션 함수
        function switchTab(tabId) {
            document.querySelectorAll('.content-section').forEach(section => {
                section.classList.remove('active');
            });
            document.querySelectorAll('.works-main-tab').forEach(tab => {
                tab.classList.remove('active-tab');
            });

            document.getElementById('section-' + tabId).classList.add('active');
            document.getElementById('tab-' + tabId).classList.add('active-tab');
        }

        // 2. 우측 스마트 고정 메뉴 스크롤 이벤트 애니메이션
        window.addEventListener('scroll', function() {
            const menuBlock = document.getElementById('menuBlock');
            if (window.scrollY > 20) {
                menuBlock.classList.add('scrolled');
            } else {
                menuBlock.classList.remove('scrolled');
            }
        });
    </script>

</body>
</html>
