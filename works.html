<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>WORKS</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Euphemia UCAS', sans-serif;
            background-color: #ffffff;
            color: #654321;
            overflow-x: hidden;
        }

        .cv-main-container {
            max-width: 1400px; 
            margin: 0 auto;
            padding: 100px 0px 100px 10px;
            display: flex;
            gap: 40px; 
            position: relative;
        }

        /* [1구역] 맨 왼쪽: 대분류 탭 메뉴 */
        .photo-zone {
            width: 155px; 
            flex-shrink: 0;
            margin-top: 43px;
            position: relative;
            z-index: 10;
        }

        .works-main-tab {
            font-size: 18px; 
            font-weight: 1100;
            color: #654321;
            text-decoration: none; 
            border: 1px solid #654321; 
            padding: 6px 12px; 
            margin-bottom: 25px; 
            display: inline-block; 
            cursor: pointer;
            transition: color 0.2s ease;
            user-select: none;
            box-sizing: border-box;
            width: 100%; 
            text-align: center;
            background-color: #ffffff;
        }
        .works-main-tab:hover { color: #0022ff; }
        .works-main-tab.active-tab { color: #0022ff; }


        /* [2구역] 가운데: 작업 타이틀 리스트 구역 */
        .info-zone {
            width: 250px; 
            flex-shrink: 0;
            padding-top: 43px; 
            position: relative;
            z-index: 10;
            background-color: #ffffff;
            margin-right: -80px; 
        }

        .content-section { display: none; }
        .content-section.active { display: block; }

        .works-year-title {
            font-size: 19px;
            font-weight: bold;
            color: #654321;
            margin-top: 40px;
            margin-bottom: 15px;
            letter-spacing: -1px;
            line-height: 1.8; 
        }
        
        .content-section > .works-year-title:first-child {
            margin-top: 0;
            padding-top: 2px; 
        }

        .works-text-link, .works-text-disabled {
            display: block;
            font-size: 16px;
            font-weight: 400; 
            color: #654321;
            letter-spacing: -1px; 
            text-decoration: none; 
            padding: 7px 0; 
            user-select: none;
            background-color: #ffffff;
        }

        .works-text-link {
            cursor: pointer;
            transition: color 0.2s ease;
        }
        .works-text-link:hover { color: #0022ff; }
        .works-text-link.viewing { color: #0022ff; font-weight: 400 !important; }
        .works-text-disabled { cursor: default; }
        .scroll-tester-space { height: 30vh; }


        /* [3구역] 사진 슬라이드 영역 */
        .artwork-display-zone {
            width: 900px; 
            margin-top: 110px; 
            position: relative;
            border: none; 
            background: none; 
            flex-shrink: 0;
        }

        /* 사진 기차가 통과하는 윈도우 */
        .photo-slider-window {
            width: 100%;
            overflow: hidden;
            position: relative;
        }

        /* 사진 기차 컨테이너 */
        .slide-train {
            display: flex;
            gap: 1px; 
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            transform: translateX(0);
        }

        /* 개별 슬라이드 칸 - 세로 정렬로 변경하여 캡션이 아래에 붙도록 설정 */
        .slide-item {
            width: 100%; 
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: flex-start;
        }

        /* 원본 사진 래퍼 */
        .viewer-frame {
            width: 100%;
            height: auto; 
            max-height: 900px; 
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
        }

        /* 오직 원본 사진만 크게 출력되는 스타일 */
        .artwork-viewer {
            max-width: 100%;
            max-height: 900px; 
            object-fit: contain;
            display: block; 
        }

        /* 💡 사진 하단에 딱 붙어서 위아래로 같이 움직이는 고정형 정보란 */
        .artwork-meta-info-fixed {
            margin-top: 12px; 
            font-size: 14px;
            line-height: 1.6;
            color: #654321;
            font-weight: 400;
            letter-spacing: -0.5px;
            background-color: #ffffff;
            width: 100%;
        }


        /* ---------------------------------------------------- */
        /* 우측 상단 고정 WORKS 로고 블록 */
        /* ---------------------------------------------------- */
        .header-menu-block {
            position: fixed; 
            top: 40px;
            right: 40px;
            display: flex;
            flex-direction: column; 
            align-items: flex-end;    
            z-index: 1000;
        }

        .cv-logo-link {
            text-decoration: none;
            display: inline-block;
            font-weight: 1100;
            line-height: 1;
            margin-bottom: 20px;
            margin-right: -180px; 
            transition: all 0.4s ease-in-out;
            position: relative;
            z-index: 1010; 
            height: 170px; 
        }

        .char-w, .char-o, .char-r, .char-k, .char-s {
            font-size: 115px; 
            color: transparent;
            -webkit-text-stroke: 1.7px #654321;
            transition: all 0.4s ease-in-out;
            font-weight: 1100;
            position: relative;
            display: inline-block;
        }
        .char-w { top: 0px; left: 0px; letter-spacing: -6px; }
        .char-o { top: 45px; left: -15px; }
        .char-r { top: -10px; left: -22px; }
        .char-k { top: 35px; left: -35px; }
        .char-s { top: 10px; left: -45px; }

        .sub-menu-container {
            display: flex;
            flex-direction: column; 
            gap: 35px; 
            align-items: flex-end; 
            opacity: 0;
            transform: translateX(50px); 
            transition: all 0.5s ease-in-out;
            pointer-events: none; 
            margin-top: 15px; 
        }

        .sub-menu-link {
            font-size: 23px; 
            text-decoration: none;
            font-weight: 900;
            color: transparent;
            -webkit-text-stroke: 1px #654321; 
            letter-spacing: -1px;
            line-height: 1.2;
        }

        .header-menu-block.scrolled .cv-logo-link {
            height: 95px;
            margin-bottom: 45px; 
            margin-right: -23px;   
        }

        .header-menu-block.scrolled .char-w, .header-menu-block.scrolled .char-o, .header-menu-block.scrolled .char-r, .header-menu-block.scrolled .char-k, .header-menu-block.scrolled .char-s {
            font-size: 60px;
            -webkit-text-stroke: 1.2px #654321; 
        }
        .header-menu-block.scrolled .char-w { top: 0px; left: 0px; }
        .header-menu-block.scrolled .char-o { top: 23px; left: -8px; }
        .header-menu-block.scrolled .char-r { top: -5px; left: -11px; }
        .header-menu-block.scrolled .char-k { top: 18px; left: -18px; }
        .header-menu-block.scrolled .char-s { top: 5px; left: -23px; }

        .header-menu-block.scrolled .sub-menu-container {
            opacity: 1;
            transform: translateX(0); 
            pointer-events: auto; 
            margin-top: 0; 
        }
    </style>
</head>
<body>

    <div class="cv-main-container">
        
        <div class="photo-zone">
            <span class="works-main-tab" id="tab-worklist" onclick="switchTab('worklist')">WORK LIST</span><br>
            <span class="works-main-tab" id="tab-exhibitions" onclick="switchTab('exhibitions')">EXHIBITIONS</span>
        </div>

        <div class="info-zone">
            <div id="section-worklist" class="content-section">
                <div class="works-year-title">2026</div>
                <span class="works-text-link" onclick="slideArtwork(this, 0)">The Last Island</span>
                <span class="works-text-link" onclick="slideArtwork(this, 1)">Bad Mom</span>
                <span class="works-text-link" onclick="slideArtwork(this, 2)">Ennui</span>
                
                <div class="works-year-title">2025</div>
                <span class="works-text-link" onclick="slideArtwork(this, 3)">Victory of Lays</span>
                <span class="works-text-link" onclick="slideArtwork(this, 4)">Hope</span>
                <span class="works-text-link" onclick="slideArtwork(this, 9)">Horse racing</span>
                <span class="works-text-link" onclick="slideArtwork(this, 10)">Baum</span>
                
                <span class="works-text-link" onclick="slideArtwork(this, 11)">Abdruck</span>
                <span class="works-text-link" onclick="slideArtwork(this, 18)">Bienenstich</span>
                <span class="works-text-link" onclick="slideArtwork(this, 19)">Wild fire</span>
            </div>

            <div id="section-exhibitions" class="content-section">
                <div class="works-year-title">2026</div>
                <div class="works-text-disabled">Do you clean your mirror, everyday? Solo</div>
                <div class="works-text-disabled">여기에 전시 이름을 적으세요 (Solo/Group)</div>
            </div>
            <div class="scroll-tester-space"></div>
        </div> 

        <div class="artwork-display-zone">
            
            <div class="photo-slider-window">
                <div class="slide-train" id="slideTrain">
                    
                    <div class="slide-item">
                        <div class="viewer-frame"><img class="artwork-viewer" src="../images/the-last-island.jpg" alt="The Last Island"></div>
                        <div class="artwork-meta-info-fixed"></div>
                    </div>
                    
                    <div class="slide-item">
                        <div class="viewer-frame"><img class="artwork-viewer" src="../images/bad-mom.jpg" alt="Bad Mom"></div>
                        <div class="artwork-meta-info-fixed"></div>
                    </div>
                    
                    <div class="slide-item">
                        <div class="viewer-frame"><img class="artwork-viewer" src="../images/ennui.jpg" alt="Ennui"></div>
                        <div class="artwork-meta-info-fixed"></div>
                    </div>
                    
                    <div class="slide-item">
                        <div class="viewer-frame"><img class="artwork-viewer" src="../images/victory-of-lays.jpg" alt="Victory of Lays"></div>

                    </div>
                    
                    <div class="slide-item">

                    </div>

                    <div class="slide-item">
                        <div class="viewer-frame"><img class="artwork-viewer" src="../images/hope/hope-1.jpg" alt="Hope Detail"></div>
                        <div class="artwork-meta-info-fixed"></div>
                    </div>

                    <div class="slide-item">
                        <div class="viewer-frame"><img class="artwork-viewer" src="../images/hope/hope-2.jpg" alt="Hope Detail"></div>
                        <div class="artwork-meta-info-fixed"></div>
                    </div>

                    <div class="slide-item">
                        <div class="viewer-frame"><img class="artwork-viewer" src="../images/hope/hope-3.jpg" alt="Hope Detail"></div>
                        <div class="artwork-meta-info-fixed"></div>
                    </div>
                    
                    <div class="slide-item">
                        <div class="viewer-frame"><img class="artwork-viewer" src="../images/hope/hope-4.jpg" alt="Hope Detail"></div>
                        <div class="artwork-meta-info-fixed"></div>
                    </div>
                    
                    <div class="slide-item">
                        <div class="viewer-frame"><img class="artwork-viewer" src="../images/horse-racing.jpg" alt="Horse racing"></div>
                        <div class="artwork-meta-info-fixed"></div>
                    </div>
                    
                    <div class="slide-item">
                        <div class="viewer-frame"><img class="artwork-viewer" src="../images/baum.jpg" alt="Baum"></div>
                        <div class="artwork-meta-info-fixed"></div>
                    </div>
                    
                    <div class="slide-item">
                        <div class="viewer-frame"><img class="artwork-viewer" src="../images/abdruck/abdruck-main.jpg" alt="Abdruck"></div>
                        <div class="artwork-meta-info-fixed"></div>
                    </div>

                    <div class="slide-item">
                        <div class="viewer-frame"><img class="artwork-viewer" src="../images/abdruck/abdruck-1.jpg" alt="Abdruck Detail"></div>
                        <div class="artwork-meta-info-fixed"></div>
                    </div>

                    <div class="slide-item">
                        <div class="viewer-frame"><img class="artwork-viewer" src="../images/abdruck/abdruck-2.jpg" alt="Abdruck Detail"></div>

                    <div class="slide-item">

                    </div>
                    
                    <div class="slide-item">
                        <div class="viewer-frame"><img class="artwork-viewer" src="../images/abdruck/abdruck-4.jpg" alt="Abdruck Detail"></div>
                        <div class="artwork-meta-info-fixed"></div>
                    </div>
                    
                    <div class="slide-item">
                        <div class="viewer-frame"><img class="artwork-viewer" src="../images/abdruck/abdruck-5.jpg" alt="Abdruck Detail"></div>
                        <div class="artwork-meta-info-fixed"></div>
                    </div>
                    
                    <div class="slide-item">
                        <div class="viewer-frame"><img class="artwork-viewer" src="../images/abdruck/abdruck-6.jpg" alt="Abdruck Detail"></div>
                        <div class="artwork-meta-info-fixed"></div>
                    </div>
                    
                    <div class="slide-item">
                        <div class="viewer-frame"><img class="artwork-viewer" src="../images/bienenstich.jpg" alt="Bienenstich"></div>

                    </div>
                    
                    <div class="slide-item">
                        <div class="viewer-frame"><img class="artwork-viewer" src="../images/wild-fire.jpg" alt="Wild fire"></div>

                    </div>

                </div>
            </div>

        </div>

        <div class="header-menu-block" id="menuBlock">
            <a href="../index.html" class="cv-logo-link">
                <span class="char-w">W</span><span class="char-o">O</span><span class="char-r">R</span><span class="char-k">K</span><span class="char-s">S</span>
            </a>
            <div class="sub-menu-container">
                <a href="../index.html" class="sub-menu-link">HOME</a>
                <a href="../cv.html" class="sub-menu-link">CV</a>
                <a href="../press.html" class="sub-menu-link">PRESS</a>
                <a href="../teller-tiger.html" class="sub-menu-link">TELLER TIGER</a>
            </div>
        </div>

    </div>

    <script>
        // 💡 작성해주신 원본 정보를 정렬된 실제 인덱스 순서에 맞춰 완벽히 매칭했습니다. (내용 절대 수정 없음)
        const artworkData = {
            0: "220 x 170 cm, Oil on canvas, 2026", 
            1: "250 × 170 cm (diptych, two canvases, each 125 × 170 cm), Oil on canvas, 2026", 
            2: "100 x 150 cm, Oil on canvas, 2026", 
            3: "220 x 60 cm, Oil on canvas, 2025", 
            
            // Hope 메인 및 디테일 구간 고정
            4: "214 x 60 x 46 cm, Drawing on Installation, Polyester, 2025", 
            5: "214 x 60 x 46 cm, Drawing on Installation, Polyester, 2025",
            6: "214 x 60 x 46 cm, Drawing on Installation, Polyester, 2025",
            7: "214 x 60 x 46 cm, Drawing on Installation, Polyester, 2025",
            8: "214 x 60 x 46 cm, Drawing on Installation, Polyester, 2025",

            9: "180 x 135 cm, Oil on canvas, Air spray, coloured pencil,  2025", 
            10: "186 x 115 cm, Oil on canvas, 2025", 
            
            // Abdruck 메인 및 디테일 구간 고정
            11: "Installation with drawing on fabric, 126 x 172 x 70 cm, 2025",
            12: "Abdruck detail, Installation with drawing on fabric, 126 x 172 x 70 cm, 2025",
            13: "Abdruck detail, Installation with drawing on fabric, 126 x 172 x 70 cm, 2025",
            14: "Abdruck detail, Installation with drawing on fabric, 126 x 172 x 70 cm, 2025",
            15: "Abdruck detail, Installation with drawing on fabric, 126 x 172 x 70 cm, 2025",
            16: "Abdruck detail, Installation with drawing on fabric, 126 x 172 x 70 cm, 2025",
            17: "Abdruck detail, Installation with drawing on fabric, 126 x 172 x 70 cm, 2025",
            
            18: "130 x 95 cm, Oil on cnvas, 2025", 
            19: "38 x 64 cm, Lithography, 2025"
        };

        function switchTab(tabId) {
            document.querySelectorAll('.content-section').forEach(section => section.classList.remove('active'));
            document.querySelectorAll('.works-main-tab').forEach(tab => tab.classList.remove('active-tab'));

            document.getElementById('section-' + tabId).classList.add('active');
            document.getElementById('tab-' + tabId).classList.add('active-tab');
            
            if(tabId !== 'worklist') {
                const train = document.getElementById('slideTrain');
                train.style.transform = `translateX(0)`;
                document.querySelectorAll('.artwork-meta-info-fixed').forEach(box => box.innerHTML = "");
            }
        }

        function slideArtwork(element, index) {
            document.querySelectorAll('.works-text-link').forEach(link => link.classList.remove('viewing'));
            if(element) element.classList.add('viewing');
            
            const train = document.getElementById('slideTrain');
            train.style.transform = `translateX(calc(-${index} * (100% + 1px)))`;

            // 💡 해당 인덱스의 slide-item 내부에 있는 정보창에만 데이터를 쏙 넣어줍니다.
            const slideItems = document.querySelectorAll('.slide-item');
            if(slideItems[index]) {
                const infoBox = slideItems[index].querySelector('.artwork-meta-info-fixed');
                if(infoBox) {
                    infoBox.innerHTML = artworkData[index] || "";
                }
            }
        }

        window.addEventListener('scroll', function() {
            const menuBlock = document.getElementById('menuBlock');
            if (window.scrollY > 20) {
                menuBlock.classList.add('scrolled');
            } else {
                menuBlock.classList.remove('scrolled');
            }
        });

        switchTab('worklist');
        
        window.onload = function() {
            const firstItem = document.querySelector('#section-worklist .works-text-link');
            if(firstItem) firstItem.click();
        };
    </script>

</body>
</html>
