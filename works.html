<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>WORKS</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Euphemia UCAS', sans-serif;
            background-color: #ffffff;
            color: #654321;
            overflow: hidden; 
        }

        .cv-main-container {
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            padding: 60px 40px 20px 40px;
            display: flex;
            gap: 40px; 
            position: relative;
        }

        /* [1구역] 맨 왼쪽: 대분류 탭 메뉴 */
        .photo-zone {
            width: 155px; 
            flex-shrink: 0;
            margin-top: 43px;
            position: relative;
            z-index: 100;
            background-color: transparent;
        }

        .works-main-tab {
            font-size: 18px; 
            font-weight: 1100;
            color: #654321;
            text-decoration: none; 
            border: 1px solid #654321; 
            padding: 6px 12px; 
            margin-bottom: 25px; 
            display: inline-block; 
            cursor: pointer;
            transition: color 0.2s ease;
            user-select: none;
            box-sizing: border-box;
            width: 100%; 
            text-align: center;
            background-color: transparent;
        }
        .works-main-tab:hover { color: #0022ff; }
        .works-main-tab.active-tab { color: #0022ff; }


        /* [2구역] 가운데: 세부 작업 타이틀 리스트 */
        .info-zone {
            width: 250px; 
            flex-shrink: 0;
            padding-top: 43px; 
            position: relative;
            z-index: 90;
            background-color: transparent;
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.3s ease;
            transform-origin: left top;
            display: none; 
        }

        .content-section { background-color: transparent; display: none; }
        .content-section.active { display: block; }

        .works-year-title {
            font-size: 19px;
            font-weight: bold;
            color: #654321;
            margin-top: 35px;
            margin-bottom: 12px;
            letter-spacing: -1px;
            line-height: 1.5; 
        }
        
        .content-section > .works-year-title:first-child {
            margin-top: 0;
            padding-top: 2px; 
        }

        .works-text-link, .works-text-disabled {
            display: block;
            font-size: 16px;
            font-weight: 400; 
            color: #654321;
            letter-spacing: -1px; 
            text-decoration: none; 
            padding: 6px 0; 
            user-select: none;
            background-color: transparent;
        }

        .works-text-link {
            cursor: pointer;
            transition: color 0.2s ease;
        }
        .works-text-link:hover { color: #0022ff; }
        .works-text-link.viewing { color: #0022ff; font-weight: 400 !important; }
        .works-text-disabled { cursor: default; }


        /* [3구역] 사진 슬라이드 영역 */
        .artwork-display-zone {
            flex-grow: 1;
            margin-top: 70px; 
            position: relative;
            z-index: 5;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            display: none; 
        }

        .artwork-display-zone.multi-mode {
            position: absolute;
            left: 0;
            top: 75px;
            width: 100%;
            height: calc(100% - 80px);
            margin-top: 58px;
        }

        .artwork-display-zone.single-mode {
            margin-left: 0px;
            position: relative;
        }

        .photo-slider-window {
            width: 100%;
            overflow-x: auto; 
            overflow-y: auto; /* 🛠️ 오타 수정 및 세로 스크롤 허용 */
            position: relative;
            scrollbar-width: none; 
            display: flex;
            flex-direction: column; /* 🛠️ 사진 아래로 텍스트가 줄바꿈되도록 배치 */
        }
        .photo-slider-window::-webkit-scrollbar { display: none; }

        .artwork-display-zone.multi-mode .photo-slider-window {
            cursor: grab;
            justify-content: flex-start;
            padding-left: 475px; 
            box-sizing: border-box;
        }
        .artwork-display-zone.multi-mode .photo-slider-window:active { cursor: grabbing; }

        .artwork-display-zone.single-mode .photo-slider-window {
            cursor: default;
            justify-content: center; 
            padding-left: 0;
        }

        /* 사진 트레인 컨테이너 */
        .slide-train {
            display: flex;
            gap: 2px; 
            width: max-content; 
        }
        .artwork-display-zone.single-mode .slide-train {
            width: 100%;
            justify-content: center;
        }

        .slide-item {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .viewer-frame {
            height: calc(100vh - 260px); 
            min-height: 450px;
            display: flex;
            align-items: center;     
            justify-content: center;
            position: relative;
        }

        .artwork-viewer {
            max-width: 100%;
            max-height: 100%; 
            object-fit: contain; 
            display: block; 
            user-select: none;
            -webkit-user-drag: none; 
        }

        /* 🛠️ 상하 스크롤 형식에 맞게 배치 고정 해제 및 정렬 조절 */
        .artwork-meta-info-fixed {
            display: block;
            font-size: 14px;
            line-height: 1.6;
            color: #654321;
            font-weight: 400;
            letter-spacing: -0.8px;
            white-space: normal; /* 긴 세로 서문 본문을 위해 자동 줄바꿈 허용 */
            pointer-events: auto;
            margin-top: 30px; /* 사진 밑 여백 */
            margin-left: 475px; /* 왼쪽 정렬 맞춤 */
            padding-bottom: 90px; /* 스크롤 끝 여백 확보 */
            opacity: 0;
            transition: opacity 0.2s ease;
            z-index: 95;
            width: 600px; /* 텍스트 가독성을 위한 가로 너비 제한 */
        }
        .artwork-display-zone.single-mode .artwork-meta-info-fixed {
            margin-left: auto;
            margin-right: auto; /* 싱글 모드일 때는 가운데 정렬 */
        }

        .custom-scrollbar-container {
            width: 600px;
            height: 3px;
            background-color: #eaeaea;
            margin: 70px auto 0 auto;
            position: relative;
            display: none; 
        }
        .custom-scrollbar-thumb {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0px; 
            background-color: #654321;
        }

        /* 우측 상단 고정 WORKS 로고 블록 */
        .header-menu-block {
            position: fixed; 
            top: 40px;
            right: 40px;
            display: flex;
            flex-direction: column; 
            align-items: flex-end;     
            z-index: 1000;
        }

        .cv-logo-link {
            text-decoration: none;
            display: inline-block;
            font-weight: 1100;
            line-height: 1;
            margin-bottom: 20px;
            margin-right: -68px; 
            transition: all 0.4s ease-in-out;
            position: relative;
            z-index: 1010; 
            height: 170px; 
        }

        .char-w, .char-o, .char-r, .char-k, .char-s {
            font-size: 115px; 
            color: transparent;
            -webkit-text-stroke: 1.7px #654321;
            transition: all 0.4s ease-in-out;
            font-weight: 1100;
            position: relative;
            display: inline-block;
        }
        .char-w { top: 0px; left: 0px; letter-spacing: -6px; }
        .char-o { top: 45px; left: -15px; }
        .char-r { top: -10px; left: -22px; }
        .char-k { top: 35px; left: -35px; }
        .char-s { top: 10px; left: -45px; }

        .sub-menu-container {
            display: flex;
            flex-direction: column; 
            gap: 35px; 
            align-items: flex-end; 
            opacity: 0;
            transform: translateX(50px); 
            transition: all 0.5s ease-in-out;
            pointer-events: none; 
            margin-top: 15px; 
        }

            color: transparent;
