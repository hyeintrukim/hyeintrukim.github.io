<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>WORKS</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Euphemia UCAS', sans-serif;
            background-color: #ffffff;
            color: #654321;
            overflow-x: hidden;
        }

        .cv-main-container {
            max-width: 1400px; 
            margin: 0 auto;
            padding: 100px 0px 100px 10px;
            display: flex;
            gap: 40px; 
            position: relative;
        }

        /* [1구역] 맨 왼쪽: 대분류 탭 메뉴 */
        .photo-zone {
            width: 155px; 
            flex-shrink: 0;
            margin-top: 43px;
            position: relative;
            z-index: 10;
        }

        .works-main-tab {
            font-size: 18px; 
            font-weight: 1100;
            color: #654321;
            text-decoration: none; 
            border: 1px solid #654321; 
            padding: 6px 12px; 
            margin-bottom: 25px; 
            display: inline-block; 
            cursor: pointer;
            transition: color 0.2s ease;
            user-select: none;
            box-sizing: border-box;
            width: 100%; 
            text-align: center;
            background-color: #ffffff;
        }
        .works-main-tab:hover { color: #0022ff; }
        .works-main-tab.active-tab { color: #0022ff; }


        /* [2구역] 가운데: 작업 타이틀 리스트 구역 */
        .info-zone {
            width: 250px; 
            flex-shrink: 0;
            padding-top: 43px; 
            position: relative;
            z-index: 10;
            background-color: #ffffff;
            margin-right: -3px; 
        }

        .content-section { display: none; }
        .content-section.active { display: block; }

        .works-year-title {
            font-size: 19px;
            font-weight: bold;
            color: #654321;
            margin-top: 40px;
            margin-bottom: 15px;
            letter-spacing: -1px;
            line-height: 1.8; 
        }
        
        .content-section > .works-year-title:first-child {
            margin-top: 0;
            padding-top: 2px; 
        }

        .works-text-link, .works-text-disabled {
            display: block;
            font-size: 16px;
            font-weight: 400; 
            color: #654321;
            letter-spacing: -1px; 
            text-decoration: none; 
            padding: 7px 0; 
            user-select: none;
            background-color: #ffffff;
        }

        .works-text-link {
            cursor: pointer;
            transition: color 0.2s ease;
        }
        .works-text-link:hover { color: #0022ff; }
        .works-text-link.viewing { color: #0022ff; font-weight: 400 !important; }
        .works-text-disabled { cursor: default; }
        .scroll-tester-space { height: 30vh; }


        /* [3구역] 사진 슬라이드 영역 */
        .artwork-display-zone {
            width: 900px; 
            margin-top: 110px; 
            position: relative;
            border: none; 
            background: none; 
            flex-shrink: 0;
        }

        /* 💡 마우스 드래그 및 터치 스와이프가 작동하는 윈도우 */
        .photo-slider-window {
            width: 100%;
            overflow-x: auto; /* 마우스 드래그 스크롤 및 휠 허용 */
            overflow-y: hidden;
            position: relative;
            scrollbar-width: none; /* 파이어폭스 스크롤바 숨김 */
            cursor: grab; /* 잡을 수 있는 손모양 아이콘 */
        }
        .photo-slider-window:active {
            cursor: grabbing; /* 드래그 중인 손모양 아이콘 */
        }
        .photo-slider-window::-webkit-scrollbar {
            display: none; /* 크롬, 사파리 기본 스크롤바 완전히 숨김 */
        }

        /* 사진 기차 컨테이너 (메뉴 클릭 시의 애니메이션은 제거) */
        .slide-train {
            display: flex;
            gap: 1px; 
            width: max-content; /* 내부 사진들 너비만큼 알아서 늘어나 대기하도록 설정 */
        }

        /* 개별 슬라이드 칸 */
        .slide-item {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: flex-start;
            /* 기본 메인 뷰어 영역 폭 유지 */
            width: 900px; 
        }

        /* 원본 사진 래퍼 */
        .viewer-frame {
            width: 100%;
            height: auto; 
            max-height: 900px; 
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
        }

        /* 오직 원본 사진만 크게 출력되는 스타일 */
        .artwork-viewer {
            max-width: 100%;
            max-height: 900px; 
            object-fit: contain;
            display: block; 
            user-select: none;
            -webkit-user-drag: none; /* 이미지 드래그 왜곡 방지 */
        }

        /* 사진 하단에 딱 붙어서 위아래로 같이 움직이는 고정형 정보란 */
        .artwork-meta-info-fixed {
            margin-top: 12px; 
            font-size: 14px;
            line-height: 1.6;
            color: #654321;
            font-weight: 400;
            letter-spacing: -0.5px;
            background-color: #ffffff;
            width: 100%;
        }

        /* 💡 디테일 작업 밑에 생기는 제작된 커스텀 슬라이드 바(스크롤바) 구역 */
        .custom-scrollbar-container {
            width: 100%;
            height: 3px;
            background-color: #eaeaea;
            margin-top: 15px;
            position: relative;
            display: none; /* 기본적으로 숨김, 디테일 샷이 있을 때만 JS로 활성화 */
        }
        .custom-scrollbar-thumb {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0px; /* JS에서 비율에 맞춰 자동 계산 */
            background-color: #654321;
        }


        /* ---------------------------------------------------- */
        /* 우측 상단 고정 WORKS 로고 블록 */
        /* ---------------------------------------------------- */
        .header-menu-block {
            position: fixed; 
            top: 40px;
            right: 40px;
            display: flex;
            flex-direction: column; 
            align-items: flex-end;    
            z-index: 1000;
        }

        .cv-logo-link {
            text-decoration: none;
            display: inline-block;
            font-weight: 1100;
            line-height: 1;
            margin-bottom: 20px;
            margin-right: -110px; /* 로고가 잘리지 않도록 기존 -150px에서 -110px로 안쪽 이동 조절 */
            transition: all 0.4s ease-in-out;
            position: relative;
            z-index: 1010; 
            height: 170px; 
        }

        .char-w, .char-o, .char-r, .char-k, .char-s {
            font-size: 115px; 
            color: transparent;
            -webkit-text-stroke: 1.7px #654321;
            transition: all 0.4s ease-in-out;
            font-weight: 1100;
            position: relative;
            display: inline-block;
        }
        .char-w { top: 0px; left: 0px; letter-spacing: -6px; }
        .char-o { top: 45px; left: -15px; }
        .char-r { top: -10px; left: -22px; }
        .char-k { top: 35px; left: -35px; }
        .char-s { top: 10px; left: -45px; }

        .sub-menu-container {
            display: flex;
            flex-direction: column; 
            gap: 35px; 
            align-items: flex-end; 
            opacity: 0;
            transform: translateX(50px); 
            transition: all 0.5s ease-in-out;
            pointer-events: none; 
            margin-top: 15px; 
        }

        .sub-menu-link {
            font-size: 23px; 
            text-decoration: none;
            font-weight: 900;
            color: transparent;
            -webkit-text-stroke: 1px #654321; 
            letter-spacing: -1px;
            line-height: 1.2;
        }

        .header-menu-block.scrolled .cv-logo-link {
            height: 95px;
            margin-bottom: 45px; 
            margin-right: -23px;   
        }

        .header-menu-block.scrolled .char-w, .header-menu-block.scrolled .char-o, .header-menu-block.scrolled .char-r, .header-menu-block.scrolled .char-k, .header-menu-block.scrolled .char-s {
            font-size: 60px;
            -webkit-text-stroke: 1.2px #654321; 
        }
        .header-menu-block.scrolled .char-w { top: 0px; left: 0px; }
        .header-menu-block.scrolled .char-o { top: 23px; left: -8px; }
        .header-menu-block.scrolled .char-r { top: -5px; left: -11px; }
        .header-menu-block.scrolled .char-k { top: 18px; left: -18px; }
        .header-menu-block.scrolled .char-s { top: 5px; left: -23px; }

        .header-menu-block.scrolled .sub-menu-container {
            opacity: 1;
            transform: translateX(0); 
            pointer-events: auto; 
            margin-top: 0; 
        }
    </style>
</head>

    <script>
        const artworkData = {
            0: "220 x 170 cm, Oil on canvas, 2026", 
            1: "250 × 170 cm (diptych, two canvases, each 125 × 170 cm), Oil on canvas, 2026", 
            2: "100 x 150 cm, Oil on canvas, 2026", 
            3: "220 x 60 cm, Oil on canvas, 2025", 
            
            4: "214 x 60 x 46 cm, Drawing on Installation, Polyester, 2025", 
            5: "214 x 60 x 46 cm, Drawing on Installation, Polyester, 2025",
            6: "214 x 60 x 46 cm, Drawing on Installation, Polyester, 2025",
            7: "214 x 60 x 46 cm, Drawing on Installation, Polyester, 2025",
            8: "214 x 60 x 46 cm, Drawing on Installation, Polyester, 2025",

            9: "180 x 135 cm, Oil on canvas, Air spray, coloured pencil,  2025", 
            10: "186 x 115 cm, Oil on canvas, 2025", 
            
            11: "Installation with drawing on fabric, 126 x 172 x 70 cm, 2025",
            12: "Abdruck detail, Installation with drawing on fabric, 126 x 172 x 70 cm, 2025",
            13: "Abdruck detail, Installation with drawing on fabric, 126 x 172 x 70 cm, 2025",
            14: "Abdruck detail, Installation with drawing on fabric, 126 x 172 x 70 cm, 2025",
            15: "Abdruck detail, Installation with drawing on fabric, 126 x 172 x 70 cm, 2025",
            16: "Abdruck detail, Installation with drawing on fabric, 126 x 172 x 70 cm, 2025",
            17: "Abdruck detail, Installation with drawing on fabric, 126 x 172 x 70 cm, 2025",
            
            18: "130 x 95 cm, Oil on cnvas, 2025", 
            19: "38 x 64 cm, Lithography, 2025"
        };

        const sliderWindow = document.getElementById('sliderWindow');
        const customScrollbar = document.getElementById('customScrollbar');
        const scrollThumb = document.getElementById('scrollThumb');
        let currentActiveGroup = 'single';

        // 💡 모든 정보창에 일단 텍스트 세팅
        document.querySelectorAll('.slide-item').forEach((item, index) => {
            const box = item.querySelector('.artwork-meta-info-fixed');
            if(box) box.innerHTML = artworkData[index] || "";
        });

        function switchTab(tabId) {
            document.querySelectorAll('.content-section').forEach(section => section.classList.remove('active'));
            document.querySelectorAll('.works-main-tab').forEach(tab => tab.classList.remove('active-tab'));

            document.getElementById('section-' + tabId).classList.add('active');
            document.getElementById('tab-' + tabId).classList.add('active-tab');
            
            if(tabId !== 'worklist') {
                sliderWindow.scrollLeft = 0;
                customScrollbar.style.display = 'none';
            }
        }

        // 💡 작업 리스트 메뉴 클릭 시 즉시(슬라이드 없이) 순간 이동 및 레이아웃 제어
        function slideArtwork(element, index) {
            document.querySelectorAll('.works-text-link').forEach(link => link.classList.remove('viewing'));
            if(element) element.classList.add('viewing');
            
            const items = document.querySelectorAll('.slide-item');
            const targetItem = items[index];
            currentActiveGroup = targetItem.getAttribute('data-group');

            // 1. 해당 사진 위치로 즉시 강제 스크롤 이동 (애니메이션 제거)
            // 각 슬라이드 아이템의 간격(1px)까지 고려하여 계산
            sliderWindow.scrollLeft = index * (900 + 1);

            // 2. 디테일이 묶여있는 그룹인지 판별하여 슬라이드 바 노출 여부 결정
            if (currentActiveGroup !== 'single') {
                customScrollbar.style.display = 'block';
                updateScrollbarThumb();
            } else {
                customScrollbar.style.display = 'none';
            }
        }

        // 💡 커스텀 스크롤 슬라이드 바의 비율 및 위치 계산 함수
        function updateScrollbarThumb() {
            if (currentActiveGroup === 'single') return;

            // 현재 활성화된 그룹인 아이템들만 필터링
            const groupItems = Array.from(document.querySelectorAll(`.slide-item[data-group="${currentActiveGroup}"]`));
            if (groupItems.length <= 1) return;

            const totalWidth = groupItems.length * (900 + 1) - 1; // 전체 그룹의 가로 총 길이
            const visibleWidth = 900; // 눈에 보이는 창 너비

            // 현재 윈도우가 해당 그룹 내에서 얼마나 스크롤 되었는지 계산
            const groupStartIndex = Array.from(document.querySelectorAll('.slide-item')).indexOf(groupItems[0]);
            const currentGroupScroll = sliderWindow.scrollLeft - (groupStartIndex * (900 + 1));

            // 슬라이드바 thumb 크기 및 위치 비율 적용
            const thumbWidthRatio = visibleWidth / totalWidth;
            const thumbWidth = Math.max(visibleWidth * thumbWidthRatio, 30); // 최소길이 30px 확보
            
            const maxScrollLeft = totalWidth - visibleWidth;
            const currentProgress = maxScrollLeft > 0 ? currentGroupScroll / maxScrollLeft : 0;
            const maxThumbLeft = visibleWidth - thumbWidth;
            const thumbLeft = Math.min(Math.max(currentProgress * maxThumbLeft, 0), maxThumbLeft);

            scrollThumb.style.width = `${thumbWidth}px`;
            scrollThumb.style.transform = `translateX(${thumbLeft}px)`;
        }

        // 사용자가 사진창을 마우스 휠이나 트랙패드로 스크롤할 때도 바가 연동되도록 바인딩
        sliderWindow.addEventListener('scroll', updateScrollbarThumb);


        /* 💡 [마우스 좌우 드래그 앤 스와이프 인터랙션 구현] */
        let isDown = false;
        let startX;
        let scrollLeftOffset;

        sliderWindow.addEventListener('mousedown', (e) => {
            isDown = true;
            startX = e.pageX - sliderWindow.offsetLeft;
            scrollLeftOffset = sliderWindow.scrollLeft;
        });
        sliderWindow.addEventListener('mouseleave', () => { isDown = false; });
        sliderWindow.addEventListener('mouseup', () => { isDown = false; });
        sliderWindow.addEventListener('mousemove', (e) => {
            if(!isDown) return;
            e.preventDefault();
            const x = e.pageX - sliderWindow.offsetLeft;
            const walk = (x - startX) * 1.5; // 마우스 이동 속도 감도 조절 (1.5배)
            sliderWindow.scrollLeft = scrollLeftOffset - walk;
        });


        window.addEventListener('scroll', function() {
            const menuBlock = document.getElementById('menuBlock');
            if (window.scrollY > 20) {
                menuBlock.classList.add('scrolled');
            } else {
                menuBlock.classList.remove('scrolled');
            }
        });

        switchTab('worklist');
        
        window.onload = function() {
            const firstItem = document.querySelector('#section-worklist .works-text-link');
            if(firstItem) firstItem.click();
        };
    </script>

</body>
</html>
