<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>WORKS</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Euphemia UCAS', sans-serif;
            background-color: #ffffff;
            color: #654321; /* 전체 기본 텍스트 톤 갈색 통일 */
        }

        .cv-main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 100px 0px 100px 10px; /* 좌측 여백 최소화 */
            display: flex;
            gap: 40px; /* 구역 간의 간격 조정 */
            position: relative;
        }

        /* [1구역: 맨 왼쪽] 클릭 가능한 대분류 탭 메뉴 */
        .photo-zone {
            width: 155px; 
            flex-shrink: 0;
            margin-top: 43px;
        }

        .works-main-tab {
            font-size: 18px; 
            font-weight: 1100;
            color: #654321;
            text-decoration: none; 
            border: 1px solid #654321; 
            padding: 6px 12px; 
            margin-bottom: 25px; 
            display: inline-block; 
            cursor: pointer;
            transition: color 0.2s ease;
            user-select: none;
            box-sizing: border-box;
            width: 100%; 
            text-align: center;
        }

        .works-main-tab:hover { color: #0022ff; }
        .works-main-tab.active-tab { color: #0022ff; }


        /* 💡 [2구역: 가운데 신설] 제목 클릭 시 사진이 뜨는 메인 뷰 영역 */
        .artwork-display-zone {
            width: 500px; /* 사진이 들어갈 넉넉한 너비 설정 */
            flex-shrink: 0;
            margin-top: 43px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* 처음엔 회색 기본 임시 박스, 사진이 로드되면 깔끔하게 노출 */
        .artwork-viewer {
            width: 100%;
            max-height: 600px;
            object-fit: contain; /* 비율 유지하며 정렬 */
            border: 1px dashed #654321; /* 이미지가 없을 때 영역 표시용 테두리 */
            background-color: #f7f7f7;
        }


        /* [3구역: 오른쪽] 펼쳐지는 콘텐츠(작품 타이틀 리스트) 공간 */
        .info-zone {
            flex-grow: 1;
            padding-top: 43px; 
            max-width: 400px; 
        }

        .content-section { display: none; }
        .content-section.active { display: block; }

        .works-year-title {
            font-size: 19px;
            font-weight: bold;
            color: #654321;
            margin-top: 40px;
            margin-bottom: 15px;
            letter-spacing: -1px;
            line-height: 1.8; 
        }
        
        .content-section > .works-year-title:first-child {
            margin-top: 0;
            padding-top: 2px; 
        }

        /* 링크 태그(a) 대신 클릭 이벤트를 줄 수 있는 span 스타일로 변경 */
        .works-text-link, .works-text-disabled {
            display: block;
            font-size: 16px;
            font-weight: 400; 
            color: #654321;
            letter-spacing: -1px; 
            text-decoration: none; 
            padding: 7px 0; 
            user-select: none;
        }

        .works-text-link {
            cursor: pointer;
            transition: color 0.2s ease;
        }
        .works-text-link:hover { color: #0022ff; }
        
        /* 현재 좌측에 노출 중인 링크 글자 색상 유지 고정 */
        .works-text-link.viewing { color: #0022ff; font-weight: bold; }

        .works-text-disabled { cursor: default; }
        .scroll-tester-space { height: 50vh; }

        /* 우측 상단 고정 스마트 메뉴 */
        .header-menu-block {
            position: fixed; 
            top: 40px;
            right: 40px;
            display: flex;
            flex-direction: column; 
            align-items: flex-end;   
            z-index: 1000;
        }

        .cv-logo-link {
            text-decoration: none;
            display: inline-block;
            font-weight: 1100;
            line-height: 1;
            margin-bottom: 20px;
            margin-right: -45px; 
            transition: all 0.4s ease-in-out;
            position: relative;
            z-index: 1010; 
            height: 170px; 
        }

        .char-w, .char-o, .char-r, .char-k, .char-s {
            font-size: 115px; 
            color: transparent;
            -webkit-text-stroke: 1.7px #654321;
            transition: all 0.4s ease-in-out;
            font-weight: 1100;
            position: relative;
            display: inline-block;
        }
        .char-w { top: 0px; left: 0px; letter-spacing: -6px; }
        .char-o { top: 45px; left: -15px; }
        .char-r { top: -10px; left: -22px; }
        .char-k { top: 35px; left: -35px; }
        .char-s { top: 10px; left: -45px; }

        .sub-menu-container {
            display: flex;
            flex-direction: column; 
            gap: 35px; 
            align-items: flex-end; 
            opacity: 0;
            transform: translateX(50px); 
            transition: all 0.5s ease-in-out;
            pointer-events: none; 
            margin-top: 15px; 
        }

        .sub-menu-link {
            font-size: 23px; 
            text-decoration: none;
            font-weight: 900;
            color: transparent;
            -webkit-text-stroke: 1px #654321; 
            letter-spacing: -1px;
            line-height: 1.2;
        }

        .header-menu-block.scrolled .cv-logo-link {
            height: 95px;
            margin-bottom: 45px; 
            margin-right: -23px;  
        }

        .header-menu-block.scrolled .char-w, .header-menu-block.scrolled .char-o, .header-menu-block.scrolled .char-r, .header-menu-block.scrolled .char-k, .header-menu-block.scrolled .char-s {
            font-size: 60px;
            -webkit-text-stroke: 1.2px #654321; 
        }
        .header-menu-block.scrolled .char-w { top: 0px; left: 0px; }
        .header-menu-block.scrolled .char-o { top: 23px; left: -8px; }
        .header-menu-block.scrolled .char-r { top: -5px; left: -11px; }
        .header-menu-block.scrolled .char-k { top: 18px; left: -18px; }
        .header-menu-block.scrolled .char-s { top: 5px; left: -23px; }

        .header-menu-block.scrolled .sub-menu-container {
            opacity: 1;
            transform: translateX(0); 
            pointer-events: auto; 
            margin-top: 0; 
        }
    </style>
</head>
<body>

    <div class="cv-main-container">
        
        <div class="photo-zone">
            <span class="works-main-tab" id="tab-worklist" onclick="switchTab('worklist')">WORK LIST</span><br>
            <span class="works-main-tab" id="tab-exhibitions" onclick="switchTab('exhibitions')">EXHIBITIONS</span>
        </div>

        <div class="artwork-display-zone">
            <img id="mainViewer" class="artwork-viewer" src="" alt="Select an artwork to view">
        </div>

        <div class="info-zone">
            
            <div id="section-worklist" class="content-section">
                <div class="works-year-title">2026</div>
                
                <span class="works-text-link" onclick="viewArtwork(this, '../images/the-last-island.jpg')">The Last Island</span>
                <span class="works-text-link" onclick="viewArtwork(this, '../images/bad-mom.jpg')">Bad Mom</span>
                <span class="works-text-link" onclick="viewArtwork(this, '../images/ennui.jpg')">Ennui</span>
                
                <div class="works-year-title">2025</div>
                
                <span class="works-text-link" onclick="viewArtwork(this, '../images/victory-of-lays.jpg')">Victory of Lays</span>
                <span class="works-text-link" onclick="viewArtwork(this, '../images/hope.jpg')">Hope</span>
                <span class="works-text-link" onclick="viewArtwork(this, '../images/horse-racing.jpg')">Horse racing</span>
                <span class="works-text-link" onclick="viewArtwork(this, '../images/baum.jpg')">Baum</span>
                <span class="works-text-link" onclick="viewArtwork(this, '../images/abdruck.jpg')">Abdruck</span>
                <span class="works-text-link" onclick="viewArtwork(this, '../images/bienenstich.jpg')">Bienenstich</span>
                <span class="works-text-link" onclick="viewArtwork(this, '../images/wild-fire.jpg')">Wild fire</span>
            </div>

            <div id="section-exhibitions" class="content-section">
                <div class="works-year-title">2026</div>
                <div class="works-text-disabled">Do you clean your mirror, everyday? Solo</div>
                <div class="works-text-disabled">여기에 전시 이름을 적으세요 (Solo/Group)</div>
            </div>
            
            <div class="scroll-tester-space"></div>
        </div> 

        <div class="header-menu-block" id="menuBlock">
            <a href="../index.html" class="cv-logo-link">
                <span class="char-w">W</span><span class="char-o">O</span><span class="char-r">R</span><span class="char-k">K</span><span class="char-s">S</span>
            </a>
            <div class="sub-menu-container">
                <a href="../index.html" class="sub-menu-link">HOME</a>
                <a href="../cv.html" class="sub-menu-link">CV</a>
                <a href="../press.html" class="sub-menu-link">PRESS</a>
                <a href="../teller-tiger.html" class="sub-menu-link">TELLER TIGER</a>
            </div>
        </div>

    </div>

    <script>
        // 대분류 탭(Work List / Exhibitions) 전환 함수
        function switchTab(tabId) {
            document.querySelectorAll('.content-section').forEach(section => section.classList.remove('active'));
            document.querySelectorAll('.works-main-tab').forEach(tab => tab.classList.remove('active-tab'));

            document.getElementById('section-' + tabId).classList.add('active');
            document.getElementById('tab-' + tabId).classList.add('active-tab');
        }

        // 💡 실시간 이미지 뷰어 교체 및 글자 파란색 유지 스크립트
        function viewArtwork(element, imagePath) {
            // 1. 모든 작품 글자에서 강조용 파란색 제거
            document.querySelectorAll('.works-text-link').forEach(link => link.classList.remove('viewing'));
            
            // 2. 현재 선택해 클릭한 그림 제목만 파란색 활성화
            element.classList.add('viewing');
            
            // 3. 가운데 이미지 창의 테두리를 실선 스타일로 바꾸고 이미지 교체출력
            const viewer = document.getElementById('mainViewer');
            viewer.style.border = "none"; 
            viewer.src = imagePath;
        }

        window.addEventListener('scroll', function() {
            const menuBlock = document.getElementById('menuBlock');
            if (window.scrollY > 20) {
                menuBlock.classList.add('scrolled');
            } else {
                menuBlock.classList.remove('scrolled');
            }
        });

        // 처음 진입했을 때 기본값 설정
        switchTab('worklist');
        
        // 첫 진입 시 첫 번째 작품(The Last Island) 사진이 자동으로 세팅되도록 호출
        window.onload = function() {
            const firstItem = document.querySelector('#section-worklist .works-text-link');
            if(firstItem) firstItem.click();
        };
    </script>

</body>
</html>
