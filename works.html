<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>WORKS</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Euphemia UCAS', sans-serif;
            background-color: #ffffff;
            color: #654321; /* 갈색 톤 통일 */
            overflow-x: hidden; /* 사진이 왼쪽으로 밀려 나갈 때 브라우저 스크롤바가 생기는 것 방지 */
        }

        .cv-main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 100px 0px 100px 10px; /* 좌측 여백 최소화 */
            display: flex;
            gap: 40px; 
            position: relative;
        }

        /* [1구역] 대분류 탭 메뉴 (고정 위치) */
        .photo-zone {
            width: 155px; 
            flex-shrink: 0;
            margin-top: 43px;
            position: relative;
            z-index: 10; /* 텍스트가 사진 위에 오도록 레이어 순서 지정 */
        }

        .works-main-tab {
            font-size: 18px; 
            font-weight: 1100;
            color: #654321;
            text-decoration: none; 
            border: 1px solid #654321; 
            padding: 6px 12px; 
            margin-bottom: 25px; 
            display: inline-block; 
            cursor: pointer;
            transition: color 0.2s ease;
            user-select: none;
            box-sizing: border-box;
            width: 100%; 
            text-align: center;
            background-color: #ffffff; /* 사진이 밑으로 지나갈 때 글자가 파묻히지 않게 배경 지정 */
        }

        .works-main-tab:hover { color: #0022ff; }
        .works-main-tab.active-tab { color: #0022ff; }


        /* 💡 [2구역: 슬라이드 뷰 박스] 사진이 움직이는 창 크기 제한 */
        .artwork-display-zone {
            width: 500px; 
            height: 600px; /* 고정 높이 지정 */
            flex-shrink: 0;
            margin-top: 43px;
            overflow: hidden; /* 이 창 크기를 벗어나는 사진들은 숨김 */
            position: relative;
            border: 1px dashed #654321; /* 틀 표시용 */
            background-color: #f7f7f7;
        }

        /* 💡 모든 사진을 가로로 한 줄로 길게 이어붙이는 기차 역할의 컨테이너 */
        .slide-train {
            display: flex;
            height: 100%;
            width: 100%;
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1); /* 부드럽게 밀리는 애니메이션 효과 */
            transform: translateX(0);
        }

        /* 기차 칸칸마다 들어가는 개별 사진 스타일 */
        .slide-item {
            width: 100%; /* 디스플레이 존 너비인 500px을 그대로 채움 */
            height: 100%;
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .artwork-viewer {
            width: 100%;
            height: 100%;
            object-fit: contain; /* 사진 비율 유지 */
        }


        /* [3구역] 우측 작품 타이틀 리스트 공간 (고정 위치) */
        .info-zone {
            flex-grow: 1;
            padding-top: 43px; 
            max-width: 400px; 
            position: relative;
            z-index: 10; /* 텍스트가 사진 위에 오도록 레벨 설정 */
            background-color: #ffffff;
        }

        .content-section { display: none; }
        .content-section.active { display: block; }

        .works-year-title {
            font-size: 19px;
            font-weight: bold;
            color: #654321;
            margin-top: 40px;
            margin-bottom: 15px;
            letter-spacing: -1px;
            line-height: 1.8; 
        }
        
        .content-section > .works-year-title:first-child {
            margin-top: 0;
            padding-top: 2px; 
        }

        .works-text-link, .works-text-disabled {
            display: block;
            font-size: 16px;
            font-weight: 400; 
            color: #654321;
            letter-spacing: -1px; 
            text-decoration: none; 
            padding: 7px 0; 
            user-select: none;
            background-color: #ffffff;
        }

        .works-text-link {
            cursor: pointer;
            transition: color 0.2s ease;
        }
        .works-text-link:hover { color: #0022ff; }
        .works-text-link.viewing { color: #0022ff; font-weight: bold; }

        .works-text-disabled { cursor: default; }
        .scroll-tester-space { height: 50vh; }

        /* 우측 상단 고정 메뉴 */
        .header-menu-block {
            position: fixed; 
            top: 40px;
            right: 40px;
            display: flex;
            flex-direction: column; 
            align-items: flex-end;   
            z-index: 1000;
        }

        .cv-logo-link {
            text-decoration: none;
            display: inline-block;
            font-weight: 1100;
            line-height: 1;
            margin-bottom: 20px;
            margin-right: -45px; 
            transition: all 0.4s ease-in-out;
            position: relative;
            z-index: 1010; 
            height: 170px; 
        }

        .char-w, .char-o, .char-r, .char-k, .char-s {
            font-size: 115px; 
            color: transparent;
            -webkit-text-stroke: 1.7px #654321;
            transition: all 0.4s ease-in-out;
            font-weight: 1100;
            position: relative;
            display: inline-block;
        }
        .char-w { top: 0px; left: 0px; letter-spacing: -6px; }
        .char-o { top: 45px; left: -15px; }
        .char-r { top: -10px; left: -22px; }
        .char-k { top: 35px; left: -35px; }
        .char-s { top: 10px; left: -45px; }

        .sub-menu-container {
            display: flex;
            flex-direction: column; 
            gap: 35px; 
            align-items: flex-end; 
            opacity: 0;
            transform: translateX(50px); 
            transition: all 0.5s ease-in-out;
            pointer-events: none; 
            margin-top: 15px; 
        }

        .sub-menu-link {
            font-size: 23px; 
            text-decoration: none;
            font-weight: 900;
            color: transparent;
            -webkit-text-stroke: 1px #654321; 
            letter-spacing: -1px;
            line-height: 1.2;
        }

        .header-menu-block.scrolled .cv-logo-link {
            height: 95px;
            margin-bottom: 45px; 
            margin-right: -23px;  
        }

        .
