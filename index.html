<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Hyein Kim</title>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Euphemia UCAS';
        }

        /* [1구역: 처음 들어왔을 때 보이는 꽉 찬 메인 화면] */
        .intro-section {
            position: relative;
            width: 100%;
            height: 100vh;
            background-image: url('images/Eden.JPG');
            background-size: cover;    
            background-position: center; 
            background-repeat: no-repeat;
        }

        /* 상단 메뉴 바 스타일 */
        .menu-container {
            width: 100%;
            padding: 40px 0;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
        }

        .menu-link {
            font-size: 40px; 
            text-decoration: none; 
            letter-spacing: -2px; 
            font-weight: 900; 
            color: transparent; 
            -webkit-text-stroke: 3px #654321; 
        }

        /* -------------------------------------------------------------
           [2구역: 💡 스크롤을 내리면 배경 사진은 고정되고 글만 움직이는 공간] 
        ---------------------------------------------------------------- */
        .content-section {
            width: 100%;
            min-height: 100vh;
            
            /* 1. 본문 뒤에 깔아줄 새로운 배경 사진 경로 (원하는 사진으로 변경하세요!) */
            background-image: url('images/Eden2.JPG'); 
            
            /* ⭐ 2. 이 문장이 핵심입니다! 스크롤을 내려도 사진을 화면에 끈끈이처럼 고정시킵니다 */
            background-attachment: fixed; 
            
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            box-sizing: border-box;
            padding: 120px 40px; /* 글씨가 더 잘 돋보이도록 여백을 살짝 넓혔습니다 */
        }

        /* 💡 배경 사진 위에서 본문 글씨들이 잘 읽히도록 하얀 반투명 상자로 감싸줍니다 */
        .content-inner {
            max-width: 800px;
            margin: 0 auto;
            background-color: rgba(255, 255, 255, 0.85); /* 85% 두께의 반투명 하얀 상자 */
            padding: 60px 40px;
            border-radius: 10px; /* 상자 모서리를 살짝 둥글게 */
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); /* 은은한 그림자 효과 */
        }
    </style>
</head>
<body>

    <!-- [1구역] 메인 화면 -->
    <div class="intro-section">
        <div class="menu-container">
            <div style="width: 100%; padding: 0 40px; box-sizing: border-box; display: flex; justify-content: space-between; gap: 40px;">
                <div><a href="cv.html" class="menu-link">CV</a></div>
                <div><a href="work.html" class="menu-link">WORKS</a></div>
                <div><a href="index.html" class="menu-link">HOME</a></div>
                <div><a href="press.html" class="menu-link">PRESS</a></div>
                <div><a href="contact.html" class="menu-link">CONTACT</a></div>
            </div>
        </div>
    </div>

    <!-- [2구역] 스크롤 시 배경 고정 본문 화면 -->
    <div class="content-section">
        <div class="content-inner">
            <h1 style="font-size: 36px; margin-bottom: 30px; color: #654321;">ABOUT ME</h1>
            <p style="font-size: 18px; line-height: 1.9; color: #333;">
                여기에 김혜인님의 소개글이나 프로필을 채워 넣으시면 됩니다.<br><br>
                이제 마우스 스크롤을 아래로 내려보시면, 하얀 글 상자는 마우스를 따라 위로 자연스럽게 올라가지만 
                그 뒤의 배경 사진은 움직이지 않고 묵직하게 고정되어 있는 아주 고급스러운 연출을 확인하실 수 있습니다.
            </p>
        </div>
    </div>

</body>
</html>
