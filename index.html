<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Hyein Kim</title>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Euphemia UCAS';
            height: 100vh;
            /* 처음 보여줄 기본 배경 사진 */
            background-image: url('images/Bienenstich.JPG');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            /* 사진이 바뀔 때 부드럽게 스르륵 바뀌는 효과 (1초 동안 변함) */
            transition: background-image 1s ease-in-out;
        }
    /* 💡 1. 닫는 태그가 빠져 있어서 추가했습니다! */
    </style>
</head>

<body>

    <div style="width: 100%; padding: 20px 0;">
        <div style="width: 100%; padding: 0 40px; box-sizing: border-box; display: flex; justify-content: space-between; gap: 40px;">
         
            <div>
                <a href="index.html" style="font-size: 20px; text-decoration: none; color: #98BA22; letter-spacing: -1px; font-weight: 900;">BIOGRAFIE</a>
            </div>
            
            <div>
                <a href="work.html" style="font-size: 16px; text-decoration: none; color: #98BA22; letter-spacing: -1px; font-weight: 900;">WORKS</a>
            </div>
            
             <div>
                <a href="press.html" style="font-size: 20px; text-decoration: none; color: #98BA22; letter-spacing: -1px; font-weight: 900;">HOME</a>
            </div>
            
            <div>
                <a href="press.html" style="font-size: 20px; text-decoration: none; color: #98BA22; letter-spacing: -1px; font-weight: 900;">PRESS</a>
            </div>
            
            <div>
                <a href="contact.html" style="font-size: 20px; text-decoration: none; color: #98BA22; letter-spacing: -1px; font-weight: 900;">CONTACT</a>
            </div>
            
        </div>
    </div>

    <script>
        // 새로 추가하신 사진 이름들을 경로에 맞게 정확히 등록했습니다.
        const images = [
            'images/Bienenstich.JPG',
            'images/Bad mom.jpg',
            'images/Glimpse of Us.JPG'
        ];

        let currentIndex = 0;

        function changeBackground() {
            currentIndex = (currentIndex + 1) % images.length;
            document.body.style.backgroundImage = `url('${images[currentIndex]}')`;
        }

        // 4000 = 4초마다 배경 사진을 변경합니다.
        setInterval(changeBackground, 4000);
    </script>

</body>
</html>
