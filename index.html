<!DOCTYPE html>

    <style>
        body {

            font-family: 'Euphemia UCAS';
        }

        /* [1구역: 처음 들어왔을 때 보이는 꽉 찬 화면] */
        .intro-section {
            position: relative;
            width: 100%;
            height: 100vh; /* 화면 높이를 정확히 100% 차지 */
            
            /* 💡 배경 사진 한 장을 가득 채우는 마법의 명령어들 */
            background-image: url('images/Eden.JPG');
            background-size: cover;    /* ⭐ 비율이 조금 바뀌더라도 화면에 빈틈없이 꽉 채우기 */
            background-position: center; /* 사진의 중심이 항상 화면 한가운데에 오도록 고정 */
            background-repeat: no-repeat;
        }

        /* 상단 메뉴 바 스타일 (사진 위에 글씨가 잘 보이도록 반투명 하얀 배경 적용) */
        .menu-container {
            width: 100%;
            padding: 40px 0;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
        }

        /* [2구역: 스크롤을 내리면 나오는 아래 본문 공간] */
        .content-section {
            width: 100%;
            min-height: 100vh;
            background-color: #ffffff;
            color: #333333;
            box-sizing: border-box;
            padding: 80px 40px;
        }

        .content-inner {
            max-width: 1000px;
            margin: 0 auto;
        }
    </style>
</head>
