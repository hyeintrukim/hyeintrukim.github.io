<!DOCTYPE html>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Euphemia UCAS';
        }

        /* [1구역: 처음 들어왔을 때 보이는 꽉 찬 화면] */
        .intro-section {
            position: relative;
            width: 100%;
            height: 100vh;
            background-image: url('images/Eden.JPG');
            background-size: cover;    
            background-position: center; 
            background-repeat: no-repeat;
        }

        /* 상단 메뉴 바 스타일 */
        .menu-container {
            width: 100%;
            padding: 40px 0;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
        }

        /* 💡 스타일 시트에 메뉴 스타일을 미리 등록해두면 아래 코드가 훨씬 깔끔해집니다! */
        .menu-link {
            font-size: 40px; 
            text-decoration: none; 
            letter-spacing: -2px; /* 너무 겹치지 않게 -5px에서 -2px로 조절했습니다 */
            font-weight: 900; /* 컴퓨터 규격상 최대 두께인 900으로 안전하게 맞췄습니다 */
            color: transparent; 
            -webkit-text-stroke: 1.5px #654321; /* ⭐ 선 두께를 1.5px로 하여 안쪽 투명이 보이게 복구 */
        }

        /* [2구역: 스크롤을 내리면 나오는 아래 본문 공간] */
        .content-section {
            width: 100%;
            min-height: 100vh;
            background-color: #ffffff;
            color: #333333;
            box-sizing: border-box;
            padding: 80px 40px;
        }

        .content-inner {
            max-width: 1000px;
            margin: 0 auto;
        }
    </style>
</head>

                <div><a href="cv.html" class="menu-link">CV</a></div>
