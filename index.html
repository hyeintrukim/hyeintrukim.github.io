<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Hyein Kim</title>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Euphemia UCAS';
        }

        /* [1구역: 고정을 풀어서 본문과 함께 위로 올라가는 메인 화면] */
        .intro-section {
            position: relative;
            width: 100%;
            height: 100vh;
            background-image: url('images/Eden.JPG');
            background-size: cover;    
            background-position: center; 
            background-repeat: no-repeat;
        }

        /* [💡 스크롤하면 따라 움직이고 작아지는 상단 메뉴 바 레이아웃] */
        .menu-container {
            width: 100%;
            padding: 35px 0;
            position: fixed; /* 항상 화면 맨 위에 떠 있도록 설정 */
            top: 0;
            left: 0;
            z-index: 100;
            transition: all 0.3s ease-in-out; 
        }

        /* 메뉴 속 글씨들의 기본 스타일 (처음엔 35px) */
        .menu-link {
            font-size: 35px; 
            text-decoration: none; 
            letter-spacing: -2px; 
            font-weight: 900; 
            color: transparent; 
            -webkit-text-stroke: 1.7px #654321; /* 선 두께 1.7px */
            transition: all 0.3s ease-in-out; 
        }

        /* ⭐ 메뉴바가 변신(.shrink)하면 글씨 크기도 25px로 자동 축소 */
        .menu-container.shrink .menu-link {
            font-size: 25px;
            -webkit-text-stroke: 1.5px #654321; /* 글씨가 작아진 만큼 선 두께 조절 */
        }

        /* [2구역: 스크롤 내리면 나오는 본문 공간] */
        .content-section {
            width: 100%;
            min-height: 100vh;
            background-image: url('images/Eden2.JPG'); 
            background-attachment: fixed; /* 본문 배경 고정 효과 */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            box-sizing: border-box;
            padding: 160px 35px 120px 35px; /* 메뉴바 가림 방지 여백 */
        }

        .content-inner {
            max-width: 800px;
            margin: 0 auto;
            background-color: rgba(255, 255, 255, 0.85);
            padding: 60px 35px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <!-- [1구역] 메인 화면 -->
    <div class="intro-section">
        <!-- 상단 메뉴 바 -->
        <div class="menu-container" id="menuBar">
            <div style="width: 100%; padding: 0 35px; box-sizing: border-box; display: flex; justify-content: space-between; gap: 35px;">
                <div><a href="cv.html" class="menu-link">CV</a></div>
                <div><a href="work.html" class="menu-link">WORKS</a></div>
                <div><a href="index.html" class="menu-link">HOME</a></div>
                <div><a href="press.html" class="menu-link">PRESS</a></div>
                <!-- 💡 파일명 공백을 하이픈(-)으로 수정한 안전한 링크 설정 -->
                <div><a href="teller-tiger.html" class="menu-link">TELLER TIGER</a></div>
            </div>
        </div>
    </div>

    <!-- [2구역] 본문 화면 -->
    <div class="content-section">
        <div class="content-inner">
            <h1 style="font-size: 36px; margin-bottom: 30px; color: #654321;">ABOUT ME</h1>
            <p style="font-size: 18px; line-height: 1.9; color: #333;">
                여기에 김혜인님의 소개글이나 프로필을 채워 넣으시면 됩니다.<br><br>
                이제 스크롤을 내리면 첫 번째 Eden 사진은 일반 사진처럼 마우스를 따라 위로 올라갑니다. 
                그리고 화면 높이의 절반(0.5)을 지나가는 순간, 상단의 큰 메뉴 글씨들이 스르륵 움직이며 크기가 줄어들고 화면 상단에 고정되어 따라오게 됩니다!
            </p>
        </div>
    </div>

    <!-- 스크롤 위치를 실시간으로 감시하는 자바스크립트 센서 -->
    <script>
        window.addEventListener('scroll', function() {
            const menuBar = document.getElementById('menuBar');
            const halfScreen = window.innerHeight * 0.5;

            if (window.scrollY > halfScreen) {
                menuBar.classList.add('shrink');
            } else {
                menuBar.classList.remove('shrink');
            }
        });
    </script>

</body>
</html>
