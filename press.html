<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>PRESS</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Euphemia UCAS', sans-serif;
            background-color: #ffffff;
            color: #654321;
        }

        /* 💡 레이아웃을 왼쪽 시작 기준으로 정렬하고, 원하시는 40px 마진을 확보 */
        .cv-main-container {
            max-width: 1200px;
            margin: 0;
            padding: 100px 40px; /* 왼쪽 여백 40px 고정 */
            position: relative;
        }

        /* 💡 기사 텍스트 공간이 왼쪽에 편안히 밀착되도록 재조정 */
        .info-zone {
            width: 100%;
            max-width: 800px;
            padding-top: 40px; 
        }

        /* 우측 상단 고정 스마트 메뉴 블록 */
        .header-menu-block {
            position: fixed; 
            top: 40px;
            right: 40px;
            display: flex;
            flex-direction: column; 
            align-items: flex-end;  
            z-index: 1000;
        }

        .cv-logo-link {
            text-decoration: none;
            display: inline-block;
            font-weight: 1100;
            line-height: 1;
            margin-bottom: 20px;
            transition: all 0.4s ease-in-out;
            position: relative;
            z-index: 1010; 
        }

        /* 💡 우측 대형 115px 타이포 로고 속성 정의 */
        .char-p, .char-r, .char-e, .char-s1, .char-s2 {
            font-size: 115px;
            color: transparent;
            -webkit-text-stroke: 1.7px #654321;
            transition: all 0.4s ease-in-out;
            display: inline-block;
        }
        .char-p { letter-spacing: -4px; }
        .char-r { position: relative; top: 35px; left: -15px; }
        .char-e { position: relative; top: 60px; left: -25px; }
        .char-s1 { position: relative; top: 85px; left: -35px; }
        .char-s2 { position: relative; top: 110px; left: -45px; }

        /* 세로로 나열되는 서브 메뉴 저장소 */
        .sub-menu-container {
            display: flex;
            flex-direction: column; 
            gap: 30px; 
            align-items: flex-end; 
            opacity: 0;
            transform: translateX(50px); 
            transition: all 0.5s ease-in-out;
            pointer-events: none; 
            margin-top: 15px; 
        }
