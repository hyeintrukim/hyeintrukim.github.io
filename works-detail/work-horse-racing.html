<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artwork Detail</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Euphemia UCAS', sans-serif;
            background-color: #ffffff;
            color: #654321; /* 기본 텍스트 톤 (갈색) */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 전체를 감싸는 메인 컨테이너 */
        .artwork-container {
            width: 100%;
            max-width: 900px; /* 이미지 및 레이아웃의 최대 너비 */
            padding: 40px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        /* 1. 상단 타이틀 구역 */
        .artwork-header {
            display: flex;
            justify-content: flex-end; /* 타이틀의 시작점을 이미지의 우측 끝선과 맞추기 위해 우측 정렬 */
            margin-bottom: 15px; /* 그림과의 간격 */
        }

        .artwork-title {
            font-size: 32px;
            font-weight: 900;
            margin: 0;
            letter-spacing: -1px;
            /* 이미지 너비와 동일한 구역 안에서 우측 끝에 배치되어, 결과적으로 이미지 우측선과 타이틀 시작선이 일치하게 됩니다 */
            width: 100%; 
            text-align: left; 
        }

        /* 2. 중앙 이미지 슬라이더 구역 */
        .artwork-slider-wrapper {
            position: relative;
            width: 100%;
            overflow: hidden;
            background-color: #fafafa; /* 이미지 로딩 전 임시 배경 */
        }

        .artwork-slides {
            display: flex;
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            width: 100%;
        }

        .slide-item {
            min-width: 100%;
            box-sizing: border-box;
        }

        .slide-item img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
        }

        /* 슬라이더 내비게이션 화살표 버튼 */
        .slider-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.7);
            border: none;
            color: #654321;
            font-size: 24px;
            padding: 15px 10px;
            cursor: pointer;
            z-index: 10;
            transition: background 0.2s ease;
        }
        .slider-btn:hover { background: rgba(255, 255, 255, 0.9); }
        .btn-prev { left: 0; }
        .btn-next { right: 0; }

        /* 슬라이더 인디케이터 (하단 점) */
        .slider-dots {
            position: absolute;
            bottom: 15px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 8px;
            z-index: 10;
        }
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(101, 67, 33, 0.3);
            cursor: pointer;
            transition: background 0.2s ease;
        }
        .dot.active { background: #654321; }

        /* 3. 하단 정보 구역 */
        .artwork-footer {
            display: flex;
            justify-content: flex-start; /* 정보의 마지막 글씨를 이미지의 좌측 끝선과 맞추기 위해 좌측 정렬 */
            margin-top: 15px; /* 그림과의 간격 */
        }

        .artwork-info {
            font-size: 14px;
            line-height: 1.6;
            color: #654321;
            margin: 0;
            width: 100%;
            text-align: right; /* 우측 정렬을 통해 정보의 마지막 글씨가 이미지 좌측선 공간의 끝과 맞물리게 합니다 */
        }
        
        /* 옅은 상세 정보를 위한 스타일 */
        .info-muted {
            color: #a38f7d;
        }
    </style>
</head>
<body>

    <div class="artwork-container">
        
        <!-- [상단 타이틀] 시작점이 그림의 우측 끝선과 정렬됨 -->
        <div class="artwork-header">
            <h1 class="artwork-title">Horse racing</h1>
        </div>

        <!-- [중앙 슬라이더] 메인 이미지 및 디테일 컷 스와이프 영역 -->
        <div class="artwork-slider-wrapper" id="sliderWrapper">
            <button class="slider-btn btn-prev" id="prevBtn">&#10094;</button>
            <button class="slider-btn btn-next" id="nextBtn">&#10095;</button>
            
            <div class="artwork-slides" id="artworkSlides">
                <!-- 메인 이미지 -->
                <div class="slide-item">
                    <img src="images/artwork-main.jpg" alt="Artwork Main View">
                </div>
                <!-- 디테일 컷 1 -->
                <div class="slide-item">
                    <img src="images/artwork-detail1.jpg" alt="Artwork Detail View 1">
                </div>
                <!-- 디테일 컷 2 (필요 시 추가, 없으면 삭제 가능) -->
                <div class="slide-item">
                    <img src="images/artwork-detail2.jpg" alt="Artwork Detail View 2">
                </div>
            </div>

            <!-- 슬라이드 위치 표시 점 (스크립트가 이미지 개수에 맞게 자동 생성) -->
            <div class="slider-dots" id="sliderDots"></div>
        </div>

        <!-- [하단 정보] 마지막 글씨가 그림의 좌측 끝선과 정렬됨 -->
        <div class="artwork-footer">
            <p class="artwork-info">
                2025<br>
                Oil on canvas<br>
                <span class="info-muted">180 x 135 cm</span>
            </p>
        </div>

    </div>

    <!-- 슬라이더 제어 스크립트 -->
    <script>
        const slides = document.getElementById('artworkSlides');
        const slideItems = document.querySelectorAll('.slide-item');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const dotsContainer = document.getElementById('sliderDots');
        const wrapper = document.getElementById('sliderWrapper');

        let currentIndex = 0;
        const totalSlides = slideItems.length;

        // 1. 이미지 개수에 맞게 하단 점(Dot) 생성
        for (let i = 0; i < totalSlides; i++) {
            const dot = document.createElement('div');
            dot.classList.add('dot');
            if (i === 0) dot.classList.add('active');
            dot.addEventListener('click', () => goToSlide(i));
            dotsContainer.appendChild(dot);
        }
        const dots = document.querySelectorAll('.dot');

        // 화살표 보이기/숨기기 예외 처리 (이미지가 1개뿐일 때)
        if (totalSlides <= 1) {
            prevBtn.style.display = 'none';
            nextBtn.style.display = 'none';
            dotsContainer.style.display = 'none';
        }

        // 2. 슬라이드 이동 함수
        function goToSlide(index) {
            if (index < 0) index = totalSlides - 1;
            if (index >= totalSlides) index = 0;
            
            currentIndex = index;
            slides.style.transform = `translateX(-${currentIndex * 100}%)`;
            
            // 점 스타일 업데이트
            dots.forEach(dot => dot.classList.remove('active'));
            if(dots[currentIndex]) dots[currentIndex].classList.add('active');
        }

        // 버튼 이벤트 리스너
        prevBtn.addEventListener('click', () => goToSlide(currentIndex - 1));
        nextBtn.addEventListener('click', () => goToSlide(currentIndex + 1));

        // 3. 모바일 터치 및 마우스 스와이프(드래그) 넘기기 기능 추가
        let startX = 0;
        let isDragging = false;

        wrapper.addEventListener('touchstart', (e) => {
            startX = e.touches[0].clientX;
            isDragging = true;
        }, { passive: true });

        wrapper.addEventListener('touchend', (e) => {
            if (!isDragging) return;
            const endX = e.changedTouches[0].clientX;
            handleSwipe(startX, endX);
            isDragging = false;
        }, { passive: true });

        wrapper.addEventListener('mousedown', (e) => {
            startX = e.clientX;
            isDragging = true;
        });

        wrapper.addEventListener('mouseup', (e) => {
            if (!isDragging) return;
            const endX = e.clientX;
            handleSwipe(startX, endX);
            isDragging = false;
        });

        function handleSwipe(start, end) {
            const threshold = 50; // 이 수치(px) 이상 쓸어넘겨야 전환됨
            if (start - end > threshold) {
                goToSlide(currentIndex + 1); // 왼쪽으로 쓸면 다음 그림
            } else if (end - start > threshold) {
                goToSlide(currentIndex - 1); // 오른쪽으로 쓸면 이전 그림
            }
        }
    </script>
</body>
</html>
