<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>CV</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Euphemia UCAS';
            background-color: #ffffff;
            color: #333333;
        }

        .cv-main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 100px 40px;
            display: flex;
            gap: 60px;
            position: relative;
        }

        /* 왼쪽 아티스트 사진 공간 */
        .photo-zone {
            width: 300px;
            flex-shrink: 0;
            margin-top: 50px;
        }

        .artist-photo {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 오른쪽 이력 텍스트 공간 */
        .info-zone {
            flex-grow: 1;
            padding-top: 140px; 
        }

        /* -------------------------------------------------------------
           [💡 우측 상단 고정 및 변신하는 스마트 메뉴 블록] 
        ---------------------------------------------------------------- */
        .header-menu-block {
            position: fixed; 
            top: 40px;
            right: 40px;
            display: flex;
            flex-direction: column; /* 세로 배열 정렬 */
            align-items: flex-end;  /* 오른쪽 정렬 라인 고정 */
            z-index: 1000;
        }

        /* [1] CV 타이포그래피 기본 스타일 (100px) */
        .cv-logo-link {
            text-decoration: none;
            display: inline-block;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 20px;
            transition: all 0.4s ease-in-out;
            position: relative;
            z-index: 1010; /* 축소되어도 다른 메뉴들보다 층위상 항상 위 */
        }

        .char-c, .char-v {
            font-size: 100px;
            color: transparent;
            -webkit-text-stroke: 1.7px #654321;
            transition: all 0.4s ease-in-out;
        }
        .char-c { letter-spacing: -4px; }
        .char-v {
            position: relative;
            top: 45px;      
            left: -15px;    
        }

        /* [2] 💡 세로로 나열되도록 변경된 서브 메뉴 저장소 */
        .sub-menu-container {
            display: flex;
            flex-direction: column; /* 가로(row)에서 세로(column)로 변경 */
            gap: 15px; /* 세로 글자들 사이의 간격 */
            align-items: flex-end; /* 오른쪽 선 정렬 */
            opacity: 0;
            transform: translateX(50px); 
            transition: all 0.5s ease-in-out;
            pointer-events: none; 
            margin-top: 15px; 
        }

        /* 💡 폰트 크기를 30px에서 7px 낮춘 23px 스타일 */
        .sub-menu-link {
            font-size: 23px; /* 7px 더 작게 조절 */
            text-decoration: none;
            font-weight: 900;
            color: transparent;
            -webkit-text-stroke: 1px #654321; /* 작아진 폰트에 맞춰 선 두께 최적화 */
            letter-spacing: -1px;
            line-height: 1.2;
        }

        /* -------------------------------------------------------------
           [⭐ 스크롤 변신(.scrolled) 모드] 
        ---------------------------------------------------------------- */
        /* 스크롤 시 CV 크기 60px로 축소 */
