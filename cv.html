<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>CV</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Euphemia UCAS', sans-serif;
            background-color: #ffffff;
            color: #333333;
        }

        .cv-main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 100px 40px;
            display: flex;
            gap: 60px;
            position: relative;
        }

        /* 왼쪽 아티스트 사진 공간 */
        .photo-zone {
            width: 450px;
            flex-shrink: 0;
            margin-top: 50px;
        }

        .artist-photo {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 오른쪽 이력 텍스트 공간 */
        .info-zone {
            flex-grow: 1;
            padding-top: 140px; 
        }

        /* 우측 상단 고정 스마트 메뉴 블록 */
        .header-menu-block {
            position: fixed; 
            top: 40px;
            right: 40px;
            display: flex;
            flex-direction: column; 
            align-items: flex-end;  
            z-index: 1000;
        }

        /* CV 타이포그래피 기본 스타일 (100px) */
        .cv-logo-link {
            text-decoration: none;
            display: inline-block;
            font-weight: 1100;
            line-height: 1;
            margin-bottom: 20px;
            transition: all 0.4s ease-in-out;
            position: relative;
            z-index: 1010; 
        }

        .char-c, .char-v {
            font-size: 100px;
            color: transparent;
            -webkit-text-stroke: 1.7px #654321;
            transition: all 0.4s ease-in-out;
        }
        .char-c { letter-spacing: -4px; }
        .char-v {
            position: relative;
            top: 45px;      
            left: -15px;    
        }

        /* 세로로 나열되는 서브 메뉴 저장소 */
        .sub-menu-container {
            display: flex;
            flex-direction: column; 
            gap: 30px; 
            align-items: flex-end; 
            opacity: 0;
            transform: translateX(50px); 
            transition: all 0.5s ease-in-out;
            pointer-events: none; 
            margin-top: 15px; 
        }

        /* 서브 메뉴 개별 글씨 스타일 (23px) */
        .sub-menu-link {
            font-size: 23px; 
            text-decoration: none;
            font-weight: 900;
            color: transparent;
            -webkit-text-stroke: 1px #654321; 
            letter-spacing: -1px;
            line-height: 1.2;
        }

        /* 스크롤 변신(.scrolled) 모드 */
        .header-menu-block.scrolled .char-c,
        .header-menu-block.scrolled .char-v {
            font-size: 60px;
            -webkit-text-stroke: 1.2px #654321; 
        }
        .header-menu-block.scrolled .char-v {
            top: 27px;
            left: -8px;
        }

        .header-menu-block.scrolled .sub-menu-container {
            opacity: 1;
            transform: translateX(0); 
            pointer-events: auto; 
        }

        /* 이력 본문 디자인 구조 */
        .section-title {
            font-size: 22px; 
            color: #654321;
            border-bottom: 1px solid #ccc; 
            padding-bottom: 10px;
            margin-top: 50px;
            letter-spacing: -1px;
        }
        .section-title:first-of-type { margin-top: 0; }
        .cv-text { font-size: 16px; line-height: 1.9; color: #555555; }
    </style>
</head>
<body>

    <div class="cv-main-container">
        
        <!-- 왼쪽 아티스트 사진 구역 -->
        <div class="photo-zone">
            <img src="images/artist photo.jpg" alt="Hyein Kim" class="artist-photo">
        </div>

        <!-- 오른쪽 이력 정보 구역 -->
        <div class="info-zone">
            
            <!-- 우측 고정 메뉴 시스템 -->
            <div class="header-menu-block" id="menuBlock">
                <a href="index.html" class="cv-logo-link">
                    <span class="char-c">C</span><span class="char-v">V</span>
                </a>
                
                <div class="sub-menu-container">
                    <a href="work.html" class="sub-menu-link">WORKS</a>
                    <a href="index.html" class="sub-menu-link">HOME</a>
                    <a href="press.html" class="sub-menu-link">PRESS</a>
                    <a href="contact.html" class="sub-menu-link">CONTACT</a>
                </div>
            </div>
            
            <!-- 이력 본문 내용 -->
            <h2 class="section-title">Education</h2>
            <p class="cv-text">
                2023 - 2026  OO대학교 미술학부 졸업<br>
                2020 - 2023  OO고등학교 졸업
            </p>

            <h2 class="section-title">Exhibitions</h2>
            <p class="cv-text">
                2025  Group Exhibition [제목] - OO 갤러리<br>
                2024  Personal Project [제목] - 서울
            </p>

            <h2 class="section-title">Contact</h2>
            <p class="cv-text">
                Email: hyein@example.com<br>
                Instagram: @hyein_art
            </p>
            
            <!-- 스크롤 테스트용 하단 여백 -->
            <div style="height: 800px;"></div>
            
        </div>
    </div>

    <!-- 스크롤 감지 센서 자바스크립트 -->
    <script>
        window.addEventListener('scroll', function() {
            const menuBlock = document.getElementById('menuBlock');
            if (window.scrollY > 20) {
                menuBlock.classList.add('scrolled');
            } else {
                menuBlock.classList.remove('scrolled');
            }
        });
    </script>

</body>
</html>
